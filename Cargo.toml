[package]
name = "kiro-assistant"
version = "0.2.0"
edition = "2021"
default-run = "kiro-assistant"
authors = ["Oren Nachman (nachmano@)"]
description = "Your AI-powered desktop companion!"
license = "MIT"
repository = "TBD"
homepage = "TBD"

[package.metadata.update]
version_url = "https://example.com/kiro-assistant/latest-version.txt"
installer_url = "https://example.com/kiro-assistant/kiro-assistant-setup.exe"
changelog_url = "https://example.com/kiro-assistant/CHANGELOG.md"

[package.metadata.update.dev]
version_url = "http://localhost:1420/updates/latest-version"
installer_url = "http://localhost:1420/updates/kiro-assistant-setup.exe"
changelog_url = "http://localhost:1420/updates/CHANGELOG.md"

[dependencies]
tauri = { version = "2.10", features = ["tray-icon", "image-png"] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-shell = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.43", features = ["full"] }
uuid = { version = "1.12", features = ["v4", "serde"] }
anyhow = "1.0"
dirs = "6.0"
log = "0.4"
env_logger = "0.11"
chrono = "0.4"
ctrlc = "3.4"
whoami = "1.5"
base64 = "0.22"
reqwest = { version = "0.12", features = ["blocking", "json"] }
urlencoding = "2.1"
url = "2.5"
zip = { version = "8.1", default-features = false, features = ["deflate"] }
semver = "1.0"
once_cell = "1.19"
tauri-plugin-notification = "2.3.3"
tauri-plugin-dialog = "2"
notify = { version = "8", default-features = false, features = ["macos_fsevent"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.55"
windows-icons = "0.3"
uiautomation = { version = "0.22", features = ["process", "control", "input"] }
once_cell = "1.19"
windows = { version = "0.59", features = [
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Shell",
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Threading",
    "Win32_System_JobObjects",
    "Win32_Security",
    "Win32_Security_Authorization",
    "Win32_System_Com",
    "Management_Deployment",
    "ApplicationModel",
    "ApplicationModel_Core",
    "ApplicationModel_DataTransfer",
    "Foundation",
    "Foundation_Collections",
] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
nix = { version = "0.29", features = ["signal"] }
signal-hook = "0.3"

[dev-dependencies]

[build-dependencies]
tauri-build = { version = "2.5", features = [] }
toml = "0.8"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[[bin]]
name = "computer-control-mcp"
path = "src/bin/computer_control_mcp.rs"
