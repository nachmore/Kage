[package]
name = "kiro-assistant"
version = "0.1.0"
edition = "2021"
authors = ["Kiro Team"]
description = "Kiro Desktop Assistant - A cross-platform AI assistant with floating window interface"
license = "MIT"
repository = "https://github.com/kiro/kiro-assistant"

[dependencies]
tauri = { version = "1.5", features = ["shell-open"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["full"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
anyhow = "1.0"

[dev-dependencies]

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
