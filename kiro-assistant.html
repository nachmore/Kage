<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Assistant</title>
    <style>
        :root {
            /* Brand Colors - Purple Palette */
            --purple-100: hsl(263, 100%, 86%);
            --purple-200: hsl(263, 100%, 80%);
            --purple-300: hsl(263, 100%, 75%);
            --purple-400: hsl(263, 100%, 69%);
            --purple-500: hsl(263, 100%, 64%);
            --purple-600: hsl(263, 77%, 58%);
            --purple-700: hsl(263, 59%, 51%);
            --purple-800: hsl(263, 56%, 45%);
            --purple-900: hsl(263, 56%, 38%);
            
            /* Brand Colors - Blue Palette */
            --blue-100: hsl(231, 100%, 91%);
            --blue-200: hsl(230, 100%, 82%);
            --blue-300: hsl(229, 100%, 74%);
            --blue-400: hsl(229, 100%, 65%);
            --blue-500: hsl(233, 91%, 54%);
            --blue-600: hsl(233, 77%, 45%);
            --blue-700: hsl(232, 77%, 36%);
            --blue-800: hsl(232, 77%, 27%);
            --blue-900: hsl(232, 76%, 18%);
            
            /* Prey Palette (Neutrals) */
            --prey-100: #F2F1F4;
            --prey-150: #EAE8ED;
            --prey-200: #DCDADF;
            --prey-300: #C1BEC6;
            --prey-400: #938F9B;
            --prey-500: #5E5966;
            --prey-600: #4A464F;
            --prey-700: #352F3D;
            --prey-750: #28242E;
            --prey-800: #211D25;
            --prey-900: #19161D;
            
            /* Primary Brand Color */
            --kiro-primary: #8E48FF;
            --kiro-gradient-start: #8FCDFC;
            --kiro-gradient-end: #C09CFF;
            
            /* Light Theme Colors */
            --light-foreground: var(--prey-700);
            --light-background: var(--prey-200);
            --light-panel: var(--prey-100);
            --light-header: var(--prey-150);
            --light-divider: var(--prey-300);
            
            /* Dark Theme Colors */
            --dark-foreground: #FFFFFF;
            --dark-background: var(--prey-900);
            --dark-panel: var(--prey-800);
            --dark-header: var(--prey-750);
            --dark-divider: var(--prey-600);
            
            /* Shadows */
            --kiro-shadow: 0px 0.5px 0.6px rgba(0, 0, 0, 0.1),
                          -0.1px 1.5px 1.7px -0.8px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, var(--kiro-gradient-start) 0%, var(--kiro-gradient-end) 100%);
            color: var(--light-foreground);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        body.dark-theme {
            background: var(--dark-background);
            color: var(--dark-foreground);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* Header */
        .header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: var(--kiro-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.3s ease-out;
        }
        
        body.dark-theme .header {
            background: rgba(33, 29, 37, 0.95);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .kiro-logo {
            width: 40px;
            height: 40px;
            animation: gentleFloat 3s ease-in-out infinite;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--kiro-gradient-start) 0%, var(--kiro-gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .theme-toggle {
            padding: 8px 16px;
            background: var(--light-panel);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--kiro-primary);
            transition: all 0.2s;
        }
        
        body.dark-theme .theme-toggle {
            background: var(--dark-panel);
        }
        
        .theme-toggle:hover {
            transform: translateY(-1px);
            box-shadow: var(--kiro-shadow);
        }
        
        .connection-status {
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .connection-status.connected {
            background: #d1fae5;
            color: #065f46;
        }
        
        .connection-status.disconnected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* Main Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
            background: var(--light-background);
        }
        
        body.dark-theme .chat-container {
            background: var(--dark-background);
        }
        
        /* Messages Area */
        .messages-area {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: var(--kiro-shadow);
            scroll-behavior: smooth;
        }
        
        body.dark-theme .messages-area {
            background: var(--dark-panel);
        }
        
        .messages-area::-webkit-scrollbar {
            width: 8px;
        }
        
        .messages-area::-webkit-scrollbar-track {
            background: var(--light-panel);
            border-radius: 4px;
        }
        
        body.dark-theme .messages-area::-webkit-scrollbar-track {
            background: var(--dark-background);
        }
        
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--prey-300);
            border-radius: 4px;
        }
        
        body.dark-theme .messages-area::-webkit-scrollbar-thumb {
            background: var(--prey-600);
        }
        
        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.3s ease-out;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--kiro-gradient-start) 0%, var(--kiro-gradient-end) 100%);
        }
        
        .message.user .message-avatar {
            background: var(--prey-300);
        }
        
        body.dark-theme .message.user .message-avatar {
            background: var(--prey-600);
        }
        
        .ghost-icon {
            width: 24px;
            height: 24px;
        }
        
        .user-icon {
            font-size: 18px;
        }
        
        .message-content {
            background: var(--light-panel);
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }
        
        body.dark-theme .message-content {
            background: var(--dark-header);
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, var(--kiro-gradient-start) 0%, var(--kiro-gradient-end) 100%);
            color: var(--prey-900);
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 12px;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--kiro-primary);
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        /* Input Area */
        .input-area {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: var(--kiro-shadow);
        }
        
        body.dark-theme .input-area {
            background: var(--dark-panel);
        }
        
        .input-box {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--prey-300);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: var(--light-panel);
            color: var(--light-foreground);
            transition: border-color 0.2s;
        }
        
        body.dark-theme .input-box {
            background: var(--dark-header);
            border-color: var(--prey-600);
            color: var(--dark-foreground);
        }
        
        .input-box:focus {
            outline: none;
            border-color: var(--kiro-primary);
        }
        
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--kiro-gradient-start) 0%, var(--kiro-gradient-end) 100%);
            border: none;
            border-radius: 12px;
            color: var(--prey-900);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(142, 72, 255, 0.3);
        }
        
        .send-btn:active {
            transform: translateY(0);
        }
        
        /* Loading Spinner */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            animation: spin 2s linear infinite;
        }
        
        .loading-text {
            font-size: 16px;
            color: var(--prey-500);
            animation: pulse 2s ease-in-out infinite;
        }
        
        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 40px;
            text-align: center;
        }
        
        .welcome-ghost {
            width: 120px;
            height: 120px;
            animation: gentleFloat 3s ease-in-out infinite;
        }
        
        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--kiro-gradient-start) 0%, var(--kiro-gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--prey-500);
            max-width: 500px;
        }
        
        body.dark-theme .welcome-subtitle {
            color: var(--prey-400);
        }
        
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .chip {
            padding: 10px 20px;
            background: var(--light-panel);
            border: 2px solid var(--prey-300);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        body.dark-theme .chip {
            background: var(--dark-header);
            border-color: var(--prey-600);
        }
        
        .chip:hover {
            border-color: var(--kiro-primary);
            transform: translateY(-2px);
            box-shadow: var(--kiro-shadow);
        }
    </style>
</head>
<body>

3.0583 35.844 22.7233 37.1017 22.3643 38.4255C22.0053 39.7494 21.781 40.5162 21.6912 40.7258C21.5476 41.0733 21.2904 41.3712 20.9194 41.6194C20.5425 41.8731 20.1387 42 19.7079 42C19.3669 42 19.0318 41.9007 18.7028 41.7021C18.3677 41.5035 18.2002 41.2443 18.2002 40.9244C18.2002 40.6596 18.7267 38.5414 19.7797 34.5697C20.8267 30.5981 21.8797 26.6927 22.9387 22.8534L24.5361 17.0946C24.5959 16.725 24.5032 16.4933 24.2579 16.3995C24.0126 16.3058 23.6028 16.2589 23.0284 16.2589C22.9446 16.2589 22.8878 16.2589 22.8579 16.2589C22.828 16.2589 22.7831 16.2589 22.7233 16.2589C22.6694 16.2589 22.6126 16.2589 22.5528 16.2589C21.9485 16.2589 21.6045 16.2203 21.5207 16.143C21.3472 16.0106 21.3322 15.6935 21.4758 15.1915C21.5895 14.8219 21.6912 14.6095 21.781 14.5544C21.8647 14.4771 21.9515 14.4385 22.0412 14.4385Z" fill="#13181F"/>
                <defs>
                    <linearGradient id="paint0_linear" x1="0" y1="0" x2="57.3826" y2="1.28291" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#8FCDFC"/>
                        <stop offset="1" stop-color="#C09CFF"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>Kiro Assistant</h1>
        </div>
        <div class="header-right">
            <span class="connection-status connected">Connected</span>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>
    </div>
    
    <!-- Main Chat Container -->
    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <!-- Welcome Screen -->
            <div class="welcome-screen">
                <svg class="welcome-ghost" viewBox="0 0 122 88" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9.46288 62.7153C39.4497 95.5029 82.2859 94.2843 107.514 71.2092C122.902 57.1351 130.598 25.5234 104.759 6.08296C78.9201 -13.3575 60.6403 20.438 31.6125 15.6856C25.62 14.7143 17.5659 16.2751 22.7917 23.3518C23.7844 24.6988 25.1069 25.7677 26.2858 26.6596C18.0576 26.9467 15.1835 26.513 10.144 26.4458C5.58702 26.2442 2.35865 26.4885 0.516924 28.7914C-1.89595 32.5329 4.59743 38.33 10.4861 43.3237C13.8824 46.5796 17.3307 50.9685 19.545 54.6306C16.8848 54.087 16.2403 53.9403 12.2698 53.5311C5.93215 52.8805 1.23467 53.7143 9.46594 62.7153H9.46288Z" fill="white"/>
                    <path d="M91.5066 41.0053C87.4169 41.3321 86.4151 36.4942 86.1799 33.5804C85.9692 30.9507 86.2715 28.8218 87.0595 27.426C87.7529 26.1982 88.828 25.5171 90.2543 25.4011C91.6837 25.285 92.9573 25.7889 93.9164 26.9037C95.0098 28.1743 95.697 30.2115 95.9047 32.7985C96.2957 37.6853 94.6525 40.7518 91.5066 41.0022V41.0053Z" fill="black"/>
                    <path d="M108.327 39.6551C104.237 39.9819 103.232 35.1439 103 32.2301C102.789 29.6004 103.092 27.4746 103.88 26.0758C104.57 24.848 105.648 24.1668 107.075 24.0508C108.504 23.9377 109.778 24.4387 110.737 25.5535C111.83 26.8241 112.517 28.8613 112.725 31.4483C113.116 36.3351 111.473 39.4016 108.327 39.652V39.6551Z" fill="black"/>
                </svg>
                <h2 class="welcome-title">Welcome to Kiro</h2>
                <p class="welcome-subtitle">Your AI-powered coding assistant. Ask me anything about your code, get help with debugging, or explore new ideas.</p>
                <div class="suggestion-chips">
                    <div class="chip" onclick="sendSuggestion('Explain this code')">💡 Explain this code</div>
                    <div class="chip" onclick="sendSuggestion('Help me debug')">🐛 Help me debug</div>
                    <div class="chip" onclick="sendSuggestion('Refactor my code')">✨ Refactor my code</div>
                    <div class="chip" onclick="sendSuggestion('Write tests')">🧪 Write tests</div>
                </div>
            </div>
        </div>
        
        <!-- Input Area -->
        <div class="input-area">
            <input type="text" class="input-box" id="messageInput" placeholder="Ask Kiro anything..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    
    <script>
        // Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                btn.textContent = '🌙 Dark Mode';
            } else {
                body.classList.add('dark-theme');
                btn.textContent = '☀️ Light Mode';
            }
        }
        
        // Send Message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message) {
                addMessage(message, 'user');
                input.value = '';
                
                // Show typing indicator
                showTypingIndicator();
                
                // Simulate response after 2 seconds
                setTimeout(() => {
                    hideTypingIndicator();
                    addMessage('I received your message: "' + message + '". This is a demo response from Kiro!', 'assistant');
                }, 2000);
            }
        }
        
        // Handle Enter Key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Send Suggestion
        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        // Add Message to Chat
        function addMessage(text, sender) {
            const messagesArea = document.getElementById('messagesArea');
            
            // Remove welcome screen if it exists
            const welcomeScreen = messagesArea.querySelector('.welcome-screen');
            if (welcomeScreen) {
                welcomeScreen.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            
            if (sender === 'assistant') {
                // Kiro Ghost Icon
                avatarDiv.innerHTML = `
                    <svg class="ghost-icon" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg">

            contentDiv.textContent = text;
            
            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
