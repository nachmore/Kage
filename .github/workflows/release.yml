# Release workflow.
#
# Three channels, driven by different triggers:
#   - stable — cut on a git tag matching `v*.*.*`. Human-initiated.
#   - beta   — manual workflow_dispatch with channel=beta. Moves the
#              `beta-latest` release to whatever ref you pick.
#   - dev    — automatic via the auto-dev-release.yml sibling
#              workflow, which calls `gh workflow run release.yml -f
#              channel=dev` when ci.yml succeeds on main. Splitting
#              the chain into its own file keeps release.yml on
#              triggers we know work; see auto-dev-release.yml's
#              own header for why.
#
# Each run:
#   1. Builds the app on Windows + macOS.
#   2. Signs the update artefacts with the Tauri updater private key
#      (sourced from the TAURI_SIGNING_PRIVATE_KEY repo secret). The
#      matching public key is baked into every binary via build.rs.
#   3. Uploads a per-platform `latest.json` manifest and the signed
#      installer to a GitHub Release keyed by the channel alias tag.
#
# The app-side updater (src/updater.rs) fetches `latest.json` from the
# GitHub release download URL for the user's channel, hands it to
# `tauri-plugin-updater`, and the plugin verifies the signature before
# running any installer. The result: a MITM attacker who swaps the
# download in flight still can't ship malicious code, because the
# signature won't verify.
#
# Versioning for rolling channels (dev / beta):
#   The version string baked into the binary needs to be monotonically
#   increasing per build, otherwise the updater plugin's internal
#   "is the manifest newer than what I'm running?" check would say no
#   and silently skip every update. We rewrite Cargo.toml's version
#   line in CI before the build to:
#
#       <major>.<minor>.<YYYYMMDDHHMM>+<channel>.<short_sha>
#
#   e.g. `0.9.202511171430+dev.abc1234`. The rewrite is ephemeral
#   (never committed back). Stable releases keep the unmodified
#   version from the v*.*.* tag, so they're untouched. We use
#   semver patch + build-metadata so version comparison stays
#   correct: `dev.<later-timestamp> > dev.<earlier-timestamp>`,
#   and the `+sha` build-metadata is ignored by semver but visible
#   in Settings → About for bug reports.
#
# What IS NOT yet in this workflow:
#   - Linux (Kage ships only Windows + macOS today).
#   - Universal Apple binaries (we build Intel + Apple Silicon
#     separately; revisit if we ever ship an arch-agnostic .dmg).
#   - Code-signing certificates for Windows/macOS OS-level trust (the
#     updater plugin signature is cryptographically strong, but Windows
#     SmartScreen and macOS notarization are separate, orthogonal
#     topics that this workflow doesn't attempt to address yet).

name: Release

on:
  push:
    # Semver tags like v1.2.3 or v1.2.3-rc.1 trigger a stable release.
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - dev
          - stable
      head_sha:
        description: "Specific SHA to build (optional; defaults to ref HEAD). Used by auto-dev-release.yml to pin the build to the exact commit CI verified."
        required: false
        type: string
        default: ""

concurrency:
  # Only one release-per-channel at a time. Stable runs queue (never
  # cancel) so a tag race never gets dropped. Beta/dev channels cancel
  # superseded runs because each force-moves the channel's alias tag —
  # only the latest matters.
  group: release-${{ github.event.inputs.channel || 'stable' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  # Resolve once up-front which channel this run targets, the SHA
  # we're going to build, and the final version string. Downstream
  # jobs just read the outputs so the channel-detection and version
  # logic both live in exactly one place — both the build job (which
  # stamps Cargo.toml) and the publish job (which writes latest.json)
  # need them to agree, so deriving twice would be a recipe for
  # silent skew.
  plan:
    name: Resolve channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.pick.outputs.channel }}
      release_tag: ${{ steps.pick.outputs.release_tag }}
      release_name: ${{ steps.pick.outputs.release_name }}
      is_prerelease: ${{ steps.pick.outputs.is_prerelease }}
      build_sha: ${{ steps.pick.outputs.build_sha }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout (for Cargo.toml)
        uses: actions/checkout@v6

      - id: pick
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "build_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch (manual or via auto-dev-release.yml)
            CH="${{ github.event.inputs.channel }}"
            echo "channel=$CH" >> "$GITHUB_OUTPUT"
            echo "release_tag=${CH}-latest" >> "$GITHUB_OUTPUT"
            echo "release_name=Kage ${CH} (latest)" >> "$GITHUB_OUTPUT"
            if [[ "$CH" == "stable" ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            fi
            # auto-dev-release.yml passes the CI-verified commit via
            # the optional head_sha input so the release builds the
            # exact commit that just passed CI, not whatever main HEAD
            # happens to be at dispatch time. Manual dispatches can
            # leave it blank to use the ref HEAD.
            INPUT_SHA="${{ github.event.inputs.head_sha }}"
            if [[ -n "$INPUT_SHA" ]]; then
              echo "build_sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
            else
              echo "build_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      # Compute the final version string. Single source of truth for
      # both the binary (stamped into Cargo.toml in the build job) and
      # the manifest (written into latest.json in the publish job).
      #
      # Stable: ship whatever's in Cargo.toml. The human bumped it
      #         deliberately before tagging.
      #
      # Rolling channels (dev / beta): replace the patch slot with a
      #         UTC `YYYYMMDDHHMM` timestamp, plus `+<channel>.<sha>`
      #         build metadata. Result: `0.9.202511171430+dev.abc1234`.
      #
      # Why this format works:
      #   - Semver compares numerically per dotted component, so
      #     `0.9.202511171430 > 0.9.0` and `0.9.202511171530 >
      #     0.9.202511171430`. Each new dev build is unambiguously
      #     newer than the previous one.
      #   - When stable bumps to `0.9.1`, dev users still see their
      #     `0.9.202511...` as newer (their build IS newer). To pull
      #     dev users back onto a stable line you bump minor —
      #     `0.10.0` > `0.9.<anything>`. This is the right behavior:
      #     dev users opted in to leading edge.
      #   - The `+build-metadata` slot is ignored by semver
      #     comparison but visible in Settings → About, so users see
      #     channel + commit at a glance and bug reports point at a
      #     precise commit.
      #
      # Minute-collision risk: two builds in the same UTC minute would
      # produce identical version strings. Concurrency.cancel-in-progress
      # already cancels superseded rolling-channel runs, and a CI run
      # takes 6+ minutes, so this is unreachable in practice. If it
      # ever happened, the second build's "update available" check
      # would be a no-op until the next push.
      - id: version
        shell: bash
        env:
          CHANNEL: ${{ steps.pick.outputs.channel }}
          RELEASE_TAG: ${{ steps.pick.outputs.release_tag }}
          BUILD_SHA: ${{ steps.pick.outputs.build_sha }}
        run: |
          set -euo pipefail
          if [[ "$CHANNEL" == "stable" ]]; then
            VERSION="${RELEASE_TAG#v}"
          else
            BASE=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            # Strip any pre-existing pre-release / build-metadata so
            # we don't double-stamp if a human happened to put one
            # into the base version.
            BASE_CLEAN="${BASE%%-*}"
            BASE_CLEAN="${BASE_CLEAN%%+*}"
            # Keep only major.minor — replace patch with the
            # timestamp. `0.9.0` → `0.9` → `0.9.<timestamp>`.
            MAJOR_MINOR=$(echo "$BASE_CLEAN" | awk -F. '{print $1"."$2}')
            STAMP=$(date -u +%Y%m%d%H%M)
            SHORT_SHA="$(echo "$BUILD_SHA" | cut -c1-7)"
            VERSION="${MAJOR_MINOR}.${STAMP}+${CHANNEL}.${SHORT_SHA}"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          # Intel Mac builds. macos-13 was retired by GitHub on
          # 2025-12-04 (https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/);
          # we use the macos-15-intel free-tier label instead.
          # Apple discontinued x86_64 support, so this runner — and
          # therefore Intel Mac builds entirely — go away when the
          # macOS 15 image is retired (Fall 2027). At that point we
          # ship arm64 only.
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Check out the SHA the plan job resolved to. For tag
          # pushes that's GITHUB_SHA; for dispatches it's whatever
          # the dispatcher passed in. Pinning explicitly avoids
          # races where main HEAD moves between plan and build.
          ref: ${{ needs.plan.outputs.build_sha }}
          # Full history so cargo can stamp version info if ever needed
          # AND so the tag-on-main guard below has the main branch to
          # compare against. Without this the merge-base check would
          # always fail on a shallow checkout.
          fetch-depth: 0
          # Explicit so future maintainers don't wonder why a force-tag
          # in the publish job works without a PAT — checkout's default
          # credentials are what authorise the rolling-tag move.
          persist-credentials: true

      # Refuse to release a v*.*.* tag that points at a commit not on
      # main. Catches "I tagged from the wrong branch" and force-pushed
      # tags that got reparented to a feature ref. Stable releases must
      # be cut from main and only main; if a hotfix branch needs a
      # stable release, merge it to main first, then re-tag.
      - name: Verify stable tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag ${{ github.ref_name }} (${{ github.sha }}) is not reachable from main. Stable releases must be cut from main; merge first, then re-tag."
            exit 1
          fi
          echo "✓ Tag is reachable from main"

      # Rewrite Cargo.toml's version for rolling channels. Stable
      # releases skip this — they ship whatever version is already
      # checked in (which the human bumps before tagging).
      #
      # The version string itself was computed once in the plan job;
      # we just paste it into Cargo.toml here. Format reminder:
      #
      #     <major>.<minor>.<YYYYMMDDHHMM>+<channel>.<short_sha>
      #     e.g. 0.9.202511171430+dev.abc1234
      #
      # See the `version` step in the plan job for the rationale.
      #
      # Cargo.lock contains the version too; cargo regenerates it on
      # the next build so we don't need to touch it explicitly. The
      # rewrite is ephemeral — the workflow never commits back to git.
      #
      # We use python for the substitution (instead of sed) because
      # BSD sed on macOS rejects the `0,/regex/{...}` form that GNU
      # sed accepts on Linux runners. Python's regex behavior is
      # identical across platforms — a single re.sub with `count=1`
      # replaces only the first matching `version = "..."` line,
      # which is what we want (later `version =` entries appear in
      # [dependencies] tables and must stay untouched).
      - name: Stamp rolling channel version
        if: needs.plan.outputs.channel != 'stable'
        shell: bash
        env:
          NEW_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          new = os.environ['NEW_VERSION']
          path = 'Cargo.toml'
          with open(path, 'r', encoding='utf-8') as f:
              src = f.read()
          # Match the first `version = "..."` line at start-of-line,
          # not the `version =` entries inside [dependencies] tables
          # (those are indented or appear inside curly braces).
          new_src, n = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"',
              f'version = "{new}"',
              src,
              count=1,
          )
          if n != 1:
              raise SystemExit(
                  f"Failed to find package version line in {path}"
              )
          with open(path, 'w', encoding='utf-8') as f:
              f.write(new_src)
          PY
          echo "--- Cargo.toml [package] (head) ---"
          head -n 15 Cargo.toml
          # tauri.conf.json deliberately omits its own "version" field.
          # When the field is absent Tauri reads CARGO_PKG_VERSION (i.e.
          # what we just rewrote above), so the binary's runtime version,
          # the bundler's installer name, and the latest.json manifest
          # all agree on a single source of truth. If you ever add the
          # field back, the rolling-channel updater will compare a
          # stamped manifest version against a hardcoded tauri.conf
          # version and prompt for "an update" forever.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.10.0 --locked

      - name: Build signed release
        env:
          # The Tauri bundler reads these to sign the updater artefacts
          # (the `.sig` sidecar next to each installer). Without them
          # createUpdaterArtifacts:true in tauri.conf.json would produce
          # unsigned .sig files and every updater client would reject
          # the update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          # Surface bundler subprocess output (notably bundle_dmg.sh
          # stderr on macOS) so intermittent dmg failures stop being
          # opaque "exit code 1" reports. See the matching note in
          # ci.yml.
          RUST_LOG: tauri_bundler=debug
        run: cargo tauri build --target ${{ matrix.target }}

      # Post-mortem for the macOS dmg bundling step. Mirrors the same
      # block in ci.yml. Runs only on failure of the build step above.
      - name: bundle_dmg post-mortem (macOS)
        if: failure() && startsWith(matrix.os, 'macos')
        run: |
          set +e
          DMG_DIR=target/${{ matrix.target }}/release/bundle/dmg
          echo "==== mounted volumes (hdiutil info) ===="
          hdiutil info | head -200
          echo
          echo "==== bundle dirs ===="
          ls -la target/${{ matrix.target }}/release/bundle/ || true
          ls -la target/${{ matrix.target }}/release/bundle/macos/ || true
          ls -la "$DMG_DIR" || true
          if [[ -f "$DMG_DIR/bundle_dmg.sh" ]]; then
            echo
            echo "==== bundle_dmg.sh (staged copy) ===="
            wc -l "$DMG_DIR/bundle_dmg.sh"
            head -40 "$DMG_DIR/bundle_dmg.sh"
            echo "... (truncated; see full file in artifacts)"
            echo
            echo "==== re-running with bash -x ===="
            ( cd "$DMG_DIR" && bash -x ./bundle_dmg.sh 2>&1 ) | tail -200 || true
          else
            echo "(no bundle_dmg.sh staged — failure happened before bundling)"
          fi

      - name: Upload Windows artefacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: bundle-windows-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
          if-no-files-found: error
          retention-days: 3

      - name: Upload macOS artefacts
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: bundle-macos-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 3

  # Single assembly job: pull the matrix artefacts, stitch together the
  # `latest.json` manifest, and upsert the release + its assets. Doing
  # this in one job keeps the manifest generation and the upload
  # atomic — a partial publish would leave users fetching a broken
  # manifest that references missing files.
  publish:
    name: Publish release
    needs: [plan, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.build_sha }}
          # Force-pushing the rolling tag below uses the default
          # GITHUB_TOKEN that checkout writes into the local git config.
          # Explicit so future maintainers don't wonder why a force-tag
          # works without a PAT.
          persist-credentials: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artefacts
        uses: actions/download-artifact@v5
        with:
          path: artefacts

      - name: Assemble latest.json
        id: manifest
        env:
          CHANNEL: ${{ needs.plan.outputs.channel }}
          TAG: ${{ needs.plan.outputs.release_tag }}
          REPO: ${{ github.repository }}
          # Single source of truth for the version, computed in the
          # plan job. We can't just reread Cargo.toml here because the
          # build job's rewrite was ephemeral and this runner did its
          # own checkout that doesn't carry it.
          VERSION: ${{ needs.plan.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Build per-platform JSON via jq's --rawfile, which preserves
          # the .sig contents exactly. No string escaping by hand, no
          # awk/sed quoting hazards — get this wrong and every client
          # silently rejects the update with no server-side signal.
          # Tauri's manifest format keys on "{OS}-{arch}" where OS is
          # one of darwin|windows|linux.
          tmp=$(mktemp -d)
          : > "$tmp/platforms.json"
          echo "{}" > "$tmp/platforms.json"

          build_platform() {
            local key="$1" dir="$2" pattern="$3"
            local file
            file=$(find "$dir" -type f -name "$pattern" 2>/dev/null | head -n 1 || true)
            if [[ -z "$file" || ! -f "${file}.sig" ]]; then
              echo "  skip $key (no $pattern under $dir)" >&2
              return
            fi
            local url="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$file")"
            jq --arg key "$key" \
               --arg url "$url" \
               --rawfile sig "${file}.sig" \
               '. + {($key): {signature: $sig, url: $url}}' \
               "$tmp/platforms.json" > "$tmp/platforms.next.json"
            mv "$tmp/platforms.next.json" "$tmp/platforms.json"
            echo "  added $key" >&2
          }

          build_platform "windows-x86_64"  "artefacts/bundle-windows-x86_64-pc-windows-msvc" "*.exe"
          build_platform "darwin-aarch64"  "artefacts/bundle-macos-aarch64-apple-darwin"     "*.app.tar.gz"
          build_platform "darwin-x86_64"   "artefacts/bundle-macos-x86_64-apple-darwin"      "*.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --slurpfile platforms "$tmp/platforms.json" \
            '{version: $version, notes: "See release notes on GitHub.", pub_date: $pub_date, platforms: $platforms[0]}' \
            > latest.json
          echo "--- latest.json ---"
          cat latest.json

      # For rolling channels (beta / dev) we force-move the alias tag
      # to the current HEAD so the GitHub Release's "this tag" link
      # reflects what's actually in the release.
      - name: Move rolling tag
        if: needs.plan.outputs.channel != 'stable'
        env:
          TAG: ${{ needs.plan.outputs.release_tag }}
          BUILD_SHA: ${{ needs.plan.outputs.build_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$BUILD_SHA"
          git push -f origin "$TAG"

      - name: Collect assets
        run: |
          mkdir -p release
          find artefacts -type f \( -name '*.exe' -o -name '*.exe.sig' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -exec cp {} release/ \;
          cp latest.json release/
          ls -la release/

      # Release name composition:
      #   - Stable (tag pushes): `release_name` is already the tag (e.g.
      #     `v0.9.0`), which is clear on its own.
      #   - Rolling channels (dev / beta): include the stamped version
      #     so the GitHub releases list shows what's actually in there
      #     without the user having to expand the assets — e.g.
      #     `Kage dev (0.9.202605241845+dev.27dac96)`.
      - name: Compose release name
        id: name
        env:
          CHANNEL: ${{ needs.plan.outputs.channel }}
          BASE_NAME: ${{ needs.plan.outputs.release_name }}
          VERSION: ${{ needs.plan.outputs.version }}
        shell: bash
        run: |
          if [[ "$CHANNEL" == "stable" ]]; then
            echo "release_name=$BASE_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=Kage $CHANNEL ($VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: ${{ steps.name.outputs.release_name }}
          prerelease: ${{ needs.plan.outputs.is_prerelease == 'true' }}
          # softprops/action-gh-release replaces existing assets when a
          # release for the same tag already exists, so the rolling
          # channels stay at "exactly the latest build" without
          # accumulating stale assets. For stable releases the action
          # naturally fails if the tag already has assets, which is
          # what we want — re-running a stable release by accident
          # should be loud.
          files: release/*
          fail_on_unmatched_files: true
