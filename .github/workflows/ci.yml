# Debug Build + Test: gate every push to main and every PR to main on a
# green build, clean lints, and a passing test suite (Rust + JS), then
# publish the raw debug binaries as a short-lived workflow artifact.
#
# This is a *debug* build — no --release, no Tauri bundle, no installer.
# Release/production builds live in a separate workflow (TBD).
#
# Runs on windows-latest only — kage is Windows-primary; half the codebase
# is gated #[cfg(target_os = "windows")] with WinRT/COM/uiautomation deps
# that don't exist on Linux/macOS, so other runners would skip the
# meaningful coverage.
#
# Hard gates: cargo fmt, cargo clippy, cargo build --bins, cargo test,
# vitest. All four together take ~5 min warm / ~10 min cold; well inside
# any GitHub Actions allowance for a personal-scale push frequency.

name: Debug Build + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a new push lands on the same ref —
# saves minutes when the user pushes a fixup commit before the previous
# one finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: debug build + test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache target/ and ~/.cargo/registry keyed on Cargo.lock — turns a
      # ~10min cold compile into a ~2min warm one. Swatinem/rust-cache
      # is the standard choice; it knows how to invalidate properly when
      # rustc / Cargo.lock / Cargo.toml change.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js (v24) with npm cache
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/tests/package-lock.json

      - name: Install JS test deps
        working-directory: ui/tests
        run: npm ci

      # ----- Lint gates ------------------------------------------------

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # --all-targets covers lib, bins, tests, examples. -D warnings
        # promotes any warning into a failure so we stay at zero warnings.
        run: cargo clippy --all-targets -- -D warnings

      # ----- Build + test gates ---------------------------------------

      # `cargo test` doesn't build the binaries (both have `test = false`
      # in Cargo.toml), so an error in main.rs or bin/computer_control_mcp.rs
      # that the lib doesn't surface would slip through. Build them
      # explicitly first.
      - name: cargo build --bins
        run: cargo build --bins

      - name: cargo test
        # `.cargo/config.toml` already caps jobs at 2 to avoid pagefile
        # exhaustion on Windows; CI inherits that.
        run: cargo test

      - name: vitest
        working-directory: ui/tests
        run: npx vitest run

      # ----- Artifact upload ------------------------------------------

      # Raw debug binaries from `cargo build --bins`. These won't run on
      # their own — the Tauri frontend and resources are only bundled by
      # `cargo tauri build` — but they're handy for "does this branch
      # compile and link?" sanity checks, attaching to an issue, or
      # grabbing a stripped-down kage-computer-control-mcp.exe to
      # reproduce MCP behaviour locally. Short retention since these
      # aren't shipping artifacts.
      - name: Upload debug binaries
        uses: actions/upload-artifact@v4
        with:
          name: kage-debug-${{ github.sha }}
          path: |
            target/debug/kage.exe
            target/debug/kage-computer-control-mcp.exe
          if-no-files-found: error
          retention-days: 7
