# Debug Build + Test: gate every push to main and every PR to main on a
# green build, clean lints, and a passing test suite (Rust + JS), then
# publish a packaged debug build as a short-lived workflow artifact.
#
# This is a *debug* build — debug profile, assertions on, devtools enabled,
# but fully bundled (.app on macOS, NSIS installer on Windows) so the
# output is a proper installable package. This serves as the "dev channel":
# anyone can grab the latest debug bundle from the workflow artifacts.
#
# Modes at a glance:
#   1. Dev:            `cargo tauri dev`          — hot reload from Python server
#   2. Debug-packaged: `cargo tauri build --debug` — bundled debug package (this workflow)
#   3. Production:     `cargo tauri build`         — release + signed (release.yml, tags only)
#
# Runs on Windows and macOS. Large swaths of the codebase are
# `#[cfg(target_os = ...)]` gated (Windows: WinRT/COM/uiautomation;
# macOS: AppKit/EventKit/AX), so single-OS coverage would miss
# platform-specific regressions. Linux is a deliberate omission — the
# Linux impls are mostly stubs and nothing ships there.
#
# Hard gates: cargo fmt, cargo clippy, biome ci, cargo tauri build
# --debug, cargo test, vitest. All six together take ~6–12 min per OS
# warm / ~15–20 min cold.

name: Debug Build + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a new push lands on the same ref —
# saves minutes when the user pushes a fixup commit before the previous
# one finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: debug build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    # APTABASE_KEY is a COMPILE-TIME fingerprint input: build.rs declares
    # `cargo:rerun-if-env-changed=APTABASE_KEY` and bakes it via
    # option_env!. If only the `cargo tauri build` step sees the key, then
    # `cargo test` (and clippy) run with a *different* env and cargo
    # invalidates the build-script — and everything downstream of it —
    # forcing a full recompile of the Tauri stack between steps even on a
    # warm cache. Set it once at job scope so every cargo invocation shares
    # the same fingerprint and the build artifacts are reused across steps.
    # (RUST_LOG / TAURI_SIGNING_* stay on the build step: RUST_LOG is
    # runtime-only and the signing keys are only used by the bundler, so
    # neither affects the compile fingerprint.)
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
      # Same fingerprint logic as APTABASE_KEY, macOS flavour: `cargo tauri
      # build` sets MACOSX_DEPLOYMENT_TARGET from tauri.conf.json's
      # minimumSystemVersion, but bare `cargo clippy` / `cargo test` run
      # without it — two different compile fingerprints for every crate
      # that touches system frameworks (objc2-*, wry, tao, tauri, ring...),
      # so macOS recompiled ~56 crates TWICE per run. Pin it at job scope
      # (must match tauri.conf.json → bundle.macOS.minimumSystemVersion).
      # Harmless on Windows. Mirrored for local builds in .cargo/config.toml.
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      # .cargo/config.toml caps build jobs at 2 to protect 16 GB dev
      # laptops from pagefile exhaustion mid-link (see the comment there).
      # Hosted runners have 4 cores and 16 GB with nothing else running,
      # so let CI use every core. Env var beats the config-file value.
      CARGO_BUILD_JOBS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Ensure rustup is functional before the toolchain action runs.
      # Some macOS runner images ship a stale rustup-init shim that
      # confuses dtolnay/rust-toolchain. A self-update fixes it.
      - name: Bootstrap rustup
        run: |
          rustup --version || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          rustup self update || true

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache target/ and ~/.cargo/registry keyed on Cargo.lock — turns a
      # ~10min cold compile into a ~2min warm one. Swatinem/rust-cache
      # is the standard choice; it knows how to invalidate properly when
      # rustc / Cargo.lock / Cargo.toml change. The action shards cache
      # keys by OS+arch automatically, so Windows and macOS don't collide.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js (v24) with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            ui-vendor/package-lock.json
            ui-tests/package-lock.json
            package-lock.json

      - name: Install JS test deps
        working-directory: ui-tests
        run: npm ci

      - name: Install root JS tooling (Biome)
        run: npm ci

      # ----- Lint gates ------------------------------------------------

      # fmt is OS-independent — only run on one runner to save minutes.
      - name: cargo fmt --check
        if: matrix.os == 'windows-latest'
        run: cargo fmt --all -- --check

      # Biome lint+format check. Warnings are promoted to errors via
      # --error-on-warnings so the gate is strict by default — same
      # philosophy as `cargo clippy -- -D warnings`. Single-OS run
      # because the rules are platform-independent.
      - name: biome ci
        if: matrix.os == 'windows-latest'
        run: npm run ci

      - name: cargo clippy
        # --workspace lints every member (kage, kage-core, the MCP
        # sidecar) — without it only the root crate is linted and the
        # non-default members are merely type-checked. --all-targets
        # covers lib, bins, tests, examples. -D warnings promotes any
        # warning into a failure so we stay at zero warnings. (Deps from
        # crates.io are never linted: cargo passes --cap-lints allow to
        # non-workspace crates, so third-party warnings can't fail us.)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # ----- Build + test gates --------------------------------------
      #
      # The bundle step runs BEFORE cargo test because some Rust
      # integration tests (e.g. tests that exercise the bundled MCP
      # binary or the calendar helper sidecar) expect the build
      # artefacts to be present at their packaged paths. Reordering
      # to fail-fast on tests breaks those — see the ci ordering
      # discussion in 4d2e8f5 / its revert.
      #
      # The trade-off is a few minutes of NSIS / .app packaging
      # cost on a red test, which is fine: tests rarely fail in
      # CI by the time they hit main, and PRs eat the cost too. If
      # we ever isolate the artefact-dependent tests behind a
      # feature flag, we could split them and move the rest before
      # the bundle.

      - name: Install Tauri CLI
        # Pinned to match the local dev env. Bump deliberately when
        # tauri itself bumps, not automatically.
        #
        # `taiki-e/cache-cargo-install-action` caches the compiled
        # `cargo-tauri` binary in `~/.cargo/bin/` keyed on the crate
        # name + version + OS, so a warm cache turns a 2–3 min
        # (Windows) / ~5 min (macOS) source compile into a ~5s
        # download. Bumping the `version` here invalidates the
        # cache automatically. Shared with release.yml — same key
        # space, so the first workflow to land a new version warms
        # the cache for the other.
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: tauri-cli@2.11.2

      # `cargo tauri build --debug` does what we want:
      #   - runs tauri codegen so the frontend (./ui) is embedded in the exe
      #   - builds in debug profile (fast, assertions on, devtools)
      #   - produces OS bundles (.app on macOS, NSIS on Windows)
      # The result is a proper installable/runnable package — useful for
      # smoke-testing a branch or grabbing a bleeding-edge build.
      #
      # This also covers the `cargo build --bins` role; `cargo tauri
      # build` invokes cargo under the hood and will fail loudly on
      # compile errors in either bin. On macOS this also triggers the
      # build.rs provisioning of the kage-calendar-helper sidecar.
      #
      # RUST_LOG=tauri_bundler=debug surfaces the bundler's subprocess
      # output (notably bundle_dmg.sh stderr on macOS), which is
      # otherwise swallowed and reported as a useless "exit code 1".
      # We've seen intermittent dmg failures with no error context;
      # this turns the next failure into something diagnosable.
      - name: cargo tauri build --debug
        # APTABASE_KEY comes from job-level env (see the note there — it's a
        # compile fingerprint input shared with clippy/test). These three are
        # build-only: signing keys for the bundler, RUST_LOG for bundler
        # diagnostics — none affect the compile fingerprint.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_LOG: tauri_bundler=debug
        run: cargo tauri build --debug

      # Post-mortem for the macOS dmg bundling step. Runs only when the
      # previous step failed. Tauri stages bundle_dmg.sh into
      # target/debug/bundle/dmg/ before invoking it, but only forwards
      # the exit code on failure — we lose the actual error. This step
      # dumps the staged script and re-runs it under `bash -x` so the
      # CI log carries the failing command + context. Also captures
      # `hdiutil info` since the most common cause is a stale mount
      # left behind by a previous run that hdiutil refuses to displace.
      - name: bundle_dmg post-mortem (macOS)
        if: failure() && matrix.os == 'macos-latest'
        run: |
          set +e
          DMG_DIR=target/debug/bundle/dmg
          echo "==== mounted volumes (hdiutil info) ===="
          hdiutil info | head -200
          echo
          echo "==== bundle dirs ===="
          ls -la target/debug/bundle/ || true
          ls -la target/debug/bundle/macos/ || true
          ls -la "$DMG_DIR" || true
          if [[ -f "$DMG_DIR/bundle_dmg.sh" ]]; then
            echo
            echo "==== bundle_dmg.sh (staged copy) ===="
            wc -l "$DMG_DIR/bundle_dmg.sh"
            head -40 "$DMG_DIR/bundle_dmg.sh"
            echo "... (truncated; see full file in artifacts)"
            echo
            echo "==== re-running with bash -x ===="
            ( cd "$DMG_DIR" && bash -x ./bundle_dmg.sh 2>&1 ) | tail -200 || true
          else
            echo "(no bundle_dmg.sh staged — failure happened before bundling)"
          fi

      - name: cargo test
        # --workspace runs every member's tests (the sidecar is a
        # non-default member, so bare `cargo test` would skip it).
        # `.cargo/config.toml` already caps jobs at 2 to avoid pagefile
        # exhaustion on Windows; CI inherits that.
        run: cargo test --workspace

      - name: vitest
        working-directory: ui-tests
        run: npx vitest run

      # ----- Artifact upload ------------------------------------------

      # Debug bundle from `cargo tauri build --debug`. Rename files to
      # include "_debug" so they're never confused with release builds.
      - name: Rename debug bundles (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem target/debug/bundle/nsis/*.exe | ForEach-Object {
            $newName = $_.Name -replace '(_x64-setup\.exe)$', '_debug$1'
            Rename-Item $_.FullName $newName
          }

      - name: Rename debug bundles (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          for f in target/debug/bundle/dmg/*.dmg; do
            mv "$f" "${f%.dmg}_debug.dmg"
          done
          for f in target/debug/bundle/macos/*.app.tar.gz; do
            mv "$f" "${f%.app.tar.gz}_debug.app.tar.gz"
          done

      - name: Upload debug bundle (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: kage-debug-windows-${{ github.sha }}
          path: target/debug/bundle/nsis/*_debug*.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload debug bundle (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: kage-debug-macos-${{ github.sha }}
          path: |
            target/debug/bundle/dmg/*_debug*.dmg
            target/debug/bundle/macos/*_debug*.app.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ----- Auto-publish dev release on green CI ---------------------
  #
  # Once both matrix legs of build-test go green on a push to main,
  # this job dispatches release.yml with channel=dev. The release
  # workflow then builds + signs + publishes the dev-latest
  # GitHub Release that the in-app updater fetches.
  #
  # We do this here in ci.yml (instead of via `on: workflow_run`
  # in a separate workflow file) because workflow_run events
  # silently fail to deliver in this repo for reasons we couldn't
  # diagnose — three CI greens in a row never triggered a
  # workflow_run-listening workflow, and even isolating the trigger
  # to its own minimal file didn't help. Composing two known-working
  # primitives instead: a `needs:` dependency from this job onto
  # build-test, and a `gh workflow run` dispatch (allowed from
  # GITHUB_TOKEN per the docs, unlike push/pr triggers).
  #
  # Guards:
  #   - event must be push (not PR — PR runs build a merge ref)
  #   - ref must be main (not feature branches)
  #   - both matrix legs of build-test must have succeeded (`needs:`)
  auto-release-dev:
    name: Auto-publish dev release
    needs: build-test
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      # Required for `gh workflow run` to dispatch release.yml.
      # Limited to actions:write (everything else stays default
      # read) so this scoped permission boost doesn't apply to
      # the matrix legs above, which don't need it.
      actions: write
    steps:
      - name: Dispatch release.yml with channel=dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the build to the exact commit CI just verified, not
          # whatever main HEAD is at dispatch time. Closes the small
          # race where two pushes land close together and dispatch
          # would otherwise build the newer commit.
          BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Dispatching release.yml for channel=dev at ${BUILD_SHA}"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f channel=dev \
            -f head_sha="${BUILD_SHA}"
