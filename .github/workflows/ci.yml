# Debug Build + Test: gate every push to main and every PR to main on a
# green build, clean lints, and a passing test suite (Rust + JS), then
# publish the raw debug binaries as a short-lived workflow artifact.
#
# This is a *debug* build — no --release, no Tauri bundle, no installer.
# Release/production builds live in a separate workflow (TBD).
#
# Runs on Windows and macOS. Large swaths of the codebase are
# `#[cfg(target_os = ...)]` gated (Windows: WinRT/COM/uiautomation;
# macOS: AppKit/EventKit/AX), so single-OS coverage would miss
# platform-specific regressions. Linux is a deliberate omission — the
# Linux impls are mostly stubs and nothing ships there.
#
# Hard gates: cargo fmt, cargo clippy, cargo build --bins, cargo test,
# vitest. All four together take ~5–10 min per OS warm / ~15 min cold.

name: Debug Build + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a new push lands on the same ref —
# saves minutes when the user pushes a fixup commit before the previous
# one finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: debug build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache target/ and ~/.cargo/registry keyed on Cargo.lock — turns a
      # ~10min cold compile into a ~2min warm one. Swatinem/rust-cache
      # is the standard choice; it knows how to invalidate properly when
      # rustc / Cargo.lock / Cargo.toml change. The action shards cache
      # keys by OS+arch automatically, so Windows and macOS don't collide.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js (v24) with npm cache
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/tests/package-lock.json

      - name: Install JS test deps
        working-directory: ui/tests
        run: npm ci

      # ----- Lint gates ------------------------------------------------

      # fmt is OS-independent — only run on one runner to save minutes.
      - name: cargo fmt --check
        if: matrix.os == 'windows-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # --all-targets covers lib, bins, tests, examples. -D warnings
        # promotes any warning into a failure so we stay at zero warnings.
        run: cargo clippy --all-targets -- -D warnings

      # ----- Build + test gates ---------------------------------------

      # `cargo test` doesn't build the binaries (both have `test = false`
      # in Cargo.toml), so an error in main.rs or bin/computer_control_mcp.rs
      # that the lib doesn't surface would slip through. Build them
      # explicitly first. On macOS this also triggers the build.rs
      # swiftc compile of src-tauri/macos/calendar-helper.swift.
      - name: cargo build --bins
        run: cargo build --bins

      - name: cargo test
        # `.cargo/config.toml` already caps jobs at 2 to avoid pagefile
        # exhaustion on Windows; CI inherits that.
        run: cargo test

      - name: vitest
        working-directory: ui/tests
        run: npx vitest run

      # ----- Artifact upload ------------------------------------------

      # Raw debug binaries. These won't run on their own — the Tauri
      # frontend and resources are only bundled by `cargo tauri build` —
      # but they're handy for sanity checks and bug repros. Short
      # retention since these aren't shipping artifacts.
      #
      # Binary names differ per OS: Windows has `.exe` suffixes, macOS
      # ships the Swift calendar helper alongside the two Rust binaries.
      - name: Upload debug binaries (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kage-debug-windows-${{ github.sha }}
          path: |
            target/debug/kage.exe
            target/debug/kage-computer-control-mcp.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload debug binaries (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kage-debug-macos-${{ github.sha }}
          path: |
            target/debug/kage
            target/debug/kage-computer-control-mcp
          if-no-files-found: error
          retention-days: 7

      # Calendar helper is built best-effort by build.rs (skips quietly
      # without swiftc). Keep its upload on `warn` so a future xcodebuild
      # outage doesn't fail the whole CI run for something optional.
      - name: Upload calendar helper (macOS, best-effort)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kage-calendar-helper-macos-${{ github.sha }}
          path: target/debug/kage-calendar-helper
          if-no-files-found: warn
          retention-days: 7
