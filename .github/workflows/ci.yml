# Debug Build + Test: gate every push to main and every PR to main on a
# green build, clean lints, and a passing test suite (Rust + JS), then
# publish a self-contained debug build as a short-lived workflow artifact.
#
# This is a *debug* build — debug profile, assertions on, devtools enabled,
# but the frontend is embedded (via `cargo tauri build --debug --no-bundle`)
# so the exe runs standalone without a dev server. This is different from
# `cargo build --bins`, which produces a debug exe that expects the dev
# server at http://localhost:1420 (mode 1, the local edit loop).
#
# Modes at a glance:
#   1. Dev:            `cargo tauri dev`                      — hot reload from Python server
#   2. Debug-packaged: `cargo tauri build --debug --no-bundle` — standalone debug exe (this workflow)
#   3. Production:     `cargo tauri build`                    — release + bundle (separate workflow, TBD)
#
# Runs on Windows and macOS. Large swaths of the codebase are
# `#[cfg(target_os = ...)]` gated (Windows: WinRT/COM/uiautomation;
# macOS: AppKit/EventKit/AX), so single-OS coverage would miss
# platform-specific regressions. Linux is a deliberate omission — the
# Linux impls are mostly stubs and nothing ships there.
#
# Hard gates: cargo fmt, cargo clippy, cargo tauri build --debug, cargo
# test, vitest. All five together take ~6–12 min per OS warm / ~15–20
# min cold.

name: Debug Build + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a new push lands on the same ref —
# saves minutes when the user pushes a fixup commit before the previous
# one finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: debug build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache target/ and ~/.cargo/registry keyed on Cargo.lock — turns a
      # ~10min cold compile into a ~2min warm one. Swatinem/rust-cache
      # is the standard choice; it knows how to invalidate properly when
      # rustc / Cargo.lock / Cargo.toml change. The action shards cache
      # keys by OS+arch automatically, so Windows and macOS don't collide.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js (v24) with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/tests/package-lock.json

      - name: Install JS test deps
        working-directory: ui/tests
        run: npm ci

      # ----- Lint gates ------------------------------------------------

      # fmt is OS-independent — only run on one runner to save minutes.
      - name: cargo fmt --check
        if: matrix.os == 'windows-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # --all-targets covers lib, bins, tests, examples. -D warnings
        # promotes any warning into a failure so we stay at zero warnings.
        run: cargo clippy --all-targets -- -D warnings

      # ----- Build + test gates ---------------------------------------

      - name: Install Tauri CLI
        # Pinned to match the local dev env. Bump deliberately when
        # tauri itself bumps, not automatically.
        run: cargo install tauri-cli --version 2.10.0 --locked

      # `cargo tauri build --debug --no-bundle` does what we want:
      #   - runs tauri codegen so the frontend (./ui) is embedded in the exe
      #   - builds in debug profile (fast, assertions on, devtools)
      #   - skips the OS bundler (NSIS / .app — that's a release concern)
      # The result at target/debug/kage[.exe] runs standalone — no dev
      # server required — which is what makes the uploaded artifact
      # actually useful.
      #
      # This also covers the `cargo build --bins` role; `cargo tauri
      # build` invokes cargo under the hood and will fail loudly on
      # compile errors in either bin. On macOS this also triggers the
      # build.rs swiftc compile of src-tauri/macos/calendar-helper.swift.
      - name: cargo tauri build --debug --no-bundle
        run: cargo tauri build --debug --no-bundle

      - name: cargo test
        # `.cargo/config.toml` already caps jobs at 2 to avoid pagefile
        # exhaustion on Windows; CI inherits that.
        run: cargo test

      - name: vitest
        working-directory: ui/tests
        run: npx vitest run

      # ----- Artifact upload ------------------------------------------

      # Self-contained debug binary from `cargo tauri build --debug
      # --no-bundle`. Frontend is embedded, so the exe runs without a
      # dev server — useful for smoke-testing a branch, attaching to an
      # issue, or letting someone try a change without checking out the
      # repo. Short retention since these aren't shipping artifacts.
      #
      # Both kage and the kage-computer-control-mcp sidecar are built
      # debug here: `beforeBuildCommand` in tauri.conf.json calls
      # scripts/build_mcp.py, which reads TAURI_ENV_DEBUG to match the
      # main build's profile.
      #
      # Binary names differ per OS: Windows has `.exe` suffixes, macOS
      # ships the Swift calendar helper alongside the two Rust binaries.
      - name: Upload debug binaries (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: kage-debug-windows-${{ github.sha }}
          path: |
            target/debug/kage.exe
            target/debug/kage-computer-control-mcp.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload debug binaries (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: kage-debug-macos-${{ github.sha }}
          path: |
            target/debug/kage
            target/debug/kage-computer-control-mcp
            target/debug/kage-calendar-helper
          if-no-files-found: error
          retention-days: 7
