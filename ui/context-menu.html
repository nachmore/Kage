<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="stylesheet" href="css/shared-kage-tokens.css">
    <link rel="stylesheet" href="css/shared-rtl.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            background-color: transparent;
        }
        body {
            font-family: var(--kage-font);
            overflow: hidden;
            padding: 8px;
        }
        .menu {
            background: #2a2a2e;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 4px 0;
            min-width: 150px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            font-size: 13px;
        }
        .menu-item {
            padding: 7px 20px;
            color: #ddd;
            cursor: pointer;
            transition: background 0.1s;
        }
        .menu-item:hover { background: var(--kage-accent); color: #fff; }
        .menu-sep { height: 1px; background: #444; margin: 4px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="menu" id="menu">
        <div class="menu-item" data-action="cut" data-i18n="context_menu.cut">Cut</div>
        <div class="menu-item" data-action="copy" data-i18n="context_menu.copy">Copy</div>
        <div class="menu-item" data-action="paste" data-i18n="context_menu.paste">Paste</div>
        <div class="menu-sep"></div>
        <div class="menu-item" data-action="settings" data-i18n="context_menu.settings">Settings</div>
        <div class="menu-item" data-action="close" data-i18n="context_menu.close">Close</div>
        <div class="menu-sep hidden" id="devSep"></div>
        <div class="menu-item hidden" id="devInspect" data-action="inspect" data-i18n="context_menu.inspect">Inspect</div>
    </div>
    <script type="module">
        import { applyTheme, initThemeListener, loadAndApplyTheme } from './js/shared/theme.js';
        import { EVT } from './js/shared/events.js';
        import { initI18n, applyStaticTranslations } from './js/shared/i18n.js';

        (async function() {
            const { invoke } = window.__TAURI__.core;
            const appWindow = window.__TAURI__.webviewWindow.getCurrentWebviewWindow();
            const LogicalSize = window.__TAURI__.dpi.LogicalSize;
            const { emit } = window.__TAURI__.event;

            try { await initI18n(invoke); } catch (e) { console.warn('[context-menu] i18n init failed', e); }
            applyStaticTranslations(document);

            initThemeListener();
            loadAndApplyTheme(invoke).catch(() => applyTheme('system'));

            // Check dev mode once at load
            try {
                const dev = await invoke('is_dev_mode');
                if (dev) {
                    document.getElementById('devSep').classList.remove('hidden');
                    document.getElementById('devInspect').classList.remove('hidden');
                }
            } catch (e) {}

            // Auto-size once at load (account for 8px body padding on each side)
            requestAnimationFrame(async () => {
                const rect = document.getElementById('menu').getBoundingClientRect();
                await appWindow.setSize(new LogicalSize(
                    Math.ceil(rect.width) + 16,
                    Math.ceil(rect.height) + 16
                ));
            });

            document.addEventListener('contextmenu', (e) => e.preventDefault());

            let actionTaken = false;

            async function emitAndHide(action) {
                if (actionTaken) return;
                actionTaken = true;
                await emit(EVT.CONTEXT_MENU_ACTION, action);
                await appWindow.hide();
            }

            // Reset actionTaken each time the window becomes visible
            appWindow.listen('tauri://focus', () => {
                actionTaken = false;
            });

            document.getElementById('menu').addEventListener('mousedown', (e) => {
                const item = e.target.closest('.menu-item');
                if (!item) return;
                const action = item.dataset.action;
                if (action) {
                    e.preventDefault();
                    emitAndHide(action);
                }
            });

            // Hide on blur
            appWindow.listen('tauri://blur', () => {
                setTimeout(() => {
                    if (!actionTaken) emitAndHide('dismissed');
                }, 150);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') emitAndHide('dismissed');
            });
        })();
    </script>
</body>
</html>
