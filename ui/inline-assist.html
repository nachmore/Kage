<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="inline_assist.window_title">Inline Assist</title>
    <link rel="stylesheet" href="css/shared-kage-tokens.css">
    <link rel="stylesheet" href="css/shared-rtl.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            overflow: hidden;
        }
        body {
            font-family: var(--kage-font);
            padding: 4px;
        }

        .layout {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* --- Ghost icon bubble --- */
        .icon-bubble {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--kage-accent, #4a9eff);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(74, 158, 255, 0.4);
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: bubble-in 0.25s ease-out;
            margin-bottom: -12px; /* overlap into the panel */
            margin-left: 8px;
            z-index: 10;
            position: relative;
        }
        .icon-bubble:hover {
            transform: scale(1.1);
            box-shadow: 0 3px 16px rgba(74, 158, 255, 0.6);
        }
        .icon-bubble svg {
            width: 22px;
            height: 16px;
            animation: ghost-float 2.5s ease-in-out infinite;
        }
        @keyframes bubble-in {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes ghost-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        .icon-bubble.thinking {
            animation: thinking-pulse 1s ease-in-out infinite;
        }
        .icon-bubble.thinking svg {
            animation: ghost-float 0.8s ease-in-out infinite;
        }
        @keyframes thinking-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 12px rgba(74, 158, 255, 0.4); }
            50% { transform: scale(1.08); box-shadow: 0 3px 20px rgba(74, 158, 255, 0.7); }
        }

        /* --- Panel --- */
        .panel {
            background: var(--kage-bg-surface, #2a2a2e);
            border: 1px solid var(--kage-border-subtle, #444);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            min-width: 240px;
            animation: panel-in 0.15s ease-out;
        }
        @keyframes panel-in {
            0% { opacity: 0; transform: translateY(-4px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .actions {
            padding: 4px 0;
            padding-top: 14px; /* extra top padding to clear the overlapping bubble */
        }
        .action-item {
            padding: 7px 14px;
            color: var(--kage-text, #ddd);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
            white-space: nowrap;
        }
        .action-item:hover, .action-item.selected {
            background: var(--kage-accent, #4a9eff);
            color: #fff;
        }
        .action-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
        .action-label { flex: 1; }
        .sep { height: 1px; background: var(--kage-border-subtle, #444); margin: 2px 0; }
        .custom-input-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 6px;
            border-top: 1px solid var(--kage-border-subtle, #444);
        }
        .custom-input-row .icon { font-size: 14px; color: var(--kage-text-muted); }
        .custom-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--kage-text, #ddd);
            font-size: 13px;
            font-family: var(--kage-font);
            min-width: 150px;
        }
        .custom-input::placeholder { color: var(--kage-text-muted, #666); }
        .status-bar {
            display: none;
            padding: 8px 14px;
            font-size: 12px;
            color: var(--kage-text-muted);
            border-top: 1px solid var(--kage-border-subtle, #444);
            align-items: center;
            gap: 8px;
        }
        .status-bar.visible { display: flex; }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid var(--kage-border-subtle);
            border-top-color: var(--kage-accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="layout" id="layout">
        <div class="icon-bubble" id="iconBubble" data-i18n-title="inline_assist.bubble.title" title="Open full chat">
            <div id="inlineAssistMascot"></div>
        </div>
        <div class="panel" id="panel">
            <div class="actions" id="actions"></div>
            <div class="custom-input-row" id="customRow">
                <span class="icon">✨</span>
                <input class="custom-input" id="customInput" placeholder="Ask anything..." data-i18n-placeholder="inline_assist.custom_input.placeholder" autocomplete="off" spellcheck="false">
            </div>
            <div class="status-bar" id="statusBar">
                <div class="spinner"></div>
                <span id="statusText" data-i18n="inline_assist.thinking">Thinking...</span>
            </div>
        </div>
    </div>
    <script type="module" src="js/inline-assist.js"></script>
</body>
</html>
