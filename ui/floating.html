<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    
    <!-- Vendored Dependencies -->
    <link rel="stylesheet" href="vendor/lib/prism-themes/prism-okaidia.min.css">
    <script defer src="vendor/lib/prism.js"></script>
    <script defer src="vendor/lib/prism-components/prism-clike.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-javascript.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-typescript.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-python.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-csharp.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-java.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-rust.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-go.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-bash.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-json.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-markdown.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-sql.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-yaml.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-css.min.js"></script>
    <script defer src="vendor/lib/prism-components/prism-markup.min.js"></script>
    <script defer src="vendor/lib/marked.min.js"></script>
    <script defer src="vendor/lib/math.js"></script>
    <!-- mermaid (3.2MB) is lazy-loaded on first use -->
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/shared-kiro-tokens.css">
    <link rel="stylesheet" href="css/shared-components.css">
    <link rel="stylesheet" href="css/floating-base.css">
    <link rel="stylesheet" href="css/floating-components.css">
    <link rel="stylesheet" href="css/floating-code-blocks.css">
    <link rel="stylesheet" href="css/floating-theme-dark.css">
</head>
<body>
    <div class="floating-container">
        <div class="ghost-container">
            <svg class="ghost-icon" viewBox="0 0 65 47" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5.71599 33.2597C21.3537 50.3579 43.692 49.7224 56.8482 37.6892C64.8725 30.3497 68.8862 13.8647 55.4115 3.72686C41.9368 -6.41103 32.4042 11.2128 17.2667 8.73447C14.1417 8.22797 9.94157 9.04188 12.6668 12.7323C13.1844 13.4347 13.8741 13.9921 14.4889 14.4572C10.198 14.6069 8.69922 14.3808 6.07118 14.3457C3.69479 14.2406 2.01125 14.368 1.05082 15.569C-0.207458 17.5201 3.17874 20.5431 6.24957 23.1473C8.02071 24.8452 9.81893 27.134 10.9737 29.0437C9.58639 28.7602 9.25032 28.6837 7.17973 28.4703C3.87477 28.131 1.42511 28.5658 5.71759 33.2597H5.71599Z" fill="white"/>
                <path class="ghost-eye ghost-eye-left" d="M48.5012 21.9388C46.3685 22.1093 45.8461 19.5864 45.7234 18.0669C45.6135 16.6955 45.7712 15.5853 46.1821 14.8574C46.5437 14.2172 47.1044 13.862 47.8482 13.8015C48.5936 13.7409 49.2578 14.0037 49.7579 14.5851C50.3281 15.2477 50.6865 16.3101 50.7948 17.6591C50.9986 20.2075 50.1417 21.8066 48.5012 21.9372V21.9388Z" fill="black"/>
                <path class="ghost-eye ghost-eye-right" d="M57.2707 21.2344C55.138 21.4048 54.614 18.8819 54.493 17.3624C54.3831 15.991 54.5407 14.8825 54.9517 14.153C55.3116 13.5127 55.8739 13.1575 56.6177 13.097C57.3631 13.0381 58.0273 13.2993 58.5274 13.8807C59.0976 14.5433 59.456 15.6056 59.5643 16.9547C59.7682 19.5031 58.9113 21.1022 57.2707 21.2328V21.2344Z" fill="black"/>
            </svg>
        </div>
        
        <div class="speech-bubble">
            <div class="resize-handle" id="resizeHandle"></div>
            <div class="loading-dots" id="loadingDots">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
            <div class="content-area" id="contentArea">
                <!-- Reusable banner (hidden by default, populated via events) -->
                <div class="floating-banner" id="floatingBanner" style="display:none">
                    <span class="floating-banner-icon" id="bannerIcon"></span>
                    <span class="floating-banner-text" id="bannerText"></span>
                    <span class="floating-banner-action" id="bannerAction"></span>
                </div>
                <button class="expand-btn" id="expandBtn" title="Open full chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"/>
                        <polyline points="9 21 3 21 3 15"/>
                        <line x1="21" y1="3" x2="14" y2="10"/>
                        <line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                </button>
                <div class="response-text" id="responseText" dir="auto"></div>
                <div class="floating-response-actions" id="floatingResponseActions" style="display:none">
                    <button class="msg-action-btn" id="floatingCopyBtn" title="Copy">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <button class="msg-action-btn" id="floatingSpeakBtn" title="Read aloud" style="display:none">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                </div>
            </div>
            <div class="quick-actions-container" id="responseActionsContainer" style="display:none"></div>
            <div class="input-container">
                <div class="attachment-preview-strip" id="attachmentPreviews"></div>
                <div class="selection-indicator" id="selectionIndicator" style="display:none">
                    <label class="selection-checkbox">
                        <input type="checkbox" id="useSelectionCheckbox" checked>
                        <span class="selection-label">📋 Include selected text</span>
                    </label>
                    <div class="quick-actions-container" id="quickActionsContainer"></div>
                </div>
                <textarea 
                    class="input-box" 
                    id="promptInput" 
                    placeholder="Ask me anything..."
                    rows="1"
                    dir="auto"
                    autofocus
                ></textarea>
                <div class="datetime-display" id="datetimeDisplay" style="display:none">
                    <div class="datetime-time" id="datetimeTime"></div>
                    <div class="datetime-date" id="datetimeDate"></div>
                </div>
                <button class="floating-stop-btn" id="floatingStopBtn" style="display:none" title="Stop generating (Esc)">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                </button>
                <button class="speech-btn" id="speechBtn" style="display:none" title="Voice input">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                </button>
                <div class="speech-wave" id="speechWave" style="display:none">
                    <div class="speech-wave-bar"></div>
                    <div class="speech-wave-bar"></div>
                    <div class="speech-wave-bar"></div>
                    <div class="speech-wave-bar"></div>
                    <div class="speech-wave-bar"></div>
                </div>
            </div>
            <div class="floating-toolbar" id="floatingToolbar" style="display:none">
                <div class="floating-toolbar-left">
                    <button class="floating-toolbar-btn" id="floatingAttachFileBtn" title="Attach file">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                    </button>
                    <button class="floating-toolbar-btn" id="floatingAttachImageBtn" title="Attach image">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    <div class="floating-toolbar-ext" id="floatingToolbarExt"></div>
                </div>
                <div class="floating-toolbar-right">
                    <span class="floating-context-indicator" id="floatingContextIndicator" title="Context usage">
                        <canvas id="floatingContextRing" width="16" height="16"></canvas>
                        <span id="floatingContextPercent">--%</span>
                    </span>
                    <button class="floating-model-selector" id="floatingModelSelector" title="Change model in settings">
                        <span id="floatingModelName">...</span>
                    </button>
                </div>
            </div>
            <input type="file" id="floatingFileInput" style="display:none" multiple>
            <input type="file" id="floatingImageInput" style="display:none" accept="image/*" multiple>
            <div class="app-suggestions" id="appSuggestions"></div>
        </div>
    </div>

    <!-- Permission Modal -->
    <div class="permission-modal-overlay" id="permissionModal" style="display: none;">
        <div class="permission-modal">
            <div class="permission-header">
                <h3>Tool Permission Required</h3>
            </div>
            <div class="permission-body">
                <div class="permission-tool-name" id="permissionToolName"></div>
                <p class="permission-tool-title" id="permissionToolTitle"></p>
                <p class="permission-description">The AI assistant wants to use this tool. Do you want to allow it?</p>
                <div class="permission-warning">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 13A6 6 0 118 2a6 6 0 010 12zm-.5-9.5v5h1v-5h-1zm0 6v1h1v-1h-1z"/>
                    </svg>
                    <span>Only approve tools you trust</span>
                </div>
            </div>
            <div class="permission-actions">
                <button class="permission-btn permission-btn-deny-always" id="permissionDenyAlways">Always Deny</button>
                <button class="permission-btn permission-btn-deny" id="permissionDeny">Deny</button>
                <button class="permission-btn permission-btn-once" id="permissionOnce">Allow</button>
                <button class="permission-btn permission-btn-always" id="permissionAlways">Always Allow</button>
            </div>
        </div>
    </div>

    <!-- Application Scripts -->
    <script type="module" src="js/floating/context-menu.js"></script>
    <script type="module" src="js/floating/permissions.js"></script>
    <script type="module" src="js/floating/main.js"></script>
</body>
</html>
