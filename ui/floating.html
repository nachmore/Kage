<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    <script src="https://unpkg.com/@tauri-apps/api@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .floating-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.2s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .ghost-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .ghost-icon {
            font-size: 40px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
        
        .speech-bubble {
            position: relative;
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            min-width: 300px;
            max-width: 400px;
        }
        
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid white;
        }
        
        .input-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #333;
            transition: all 0.2s;
        }
        
        .input-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-box::placeholder {
            color: #9ca3af;
        }
        
        .hint-text {
            margin-top: 8px;
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
        }
        
        .app-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 8px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }
        
        .app-suggestions.visible {
            display: block;
        }
        
        .app-suggestion-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .app-suggestion-item:last-child {
            border-bottom: none;
        }
        
        .app-suggestion-item:hover,
        .app-suggestion-item.selected {
            background: #f3f4f6;
        }
        
        .app-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }
        
        .app-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
        }
        
        .app-name {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="floating-container">
        <div class="ghost-container">
            <div class="ghost-icon">👻</div>
        </div>
        
        <div class="speech-bubble">
            <input 
                type="text" 
                class="input-box" 
                id="promptInput" 
                placeholder="Ask me anything..."
                autofocus
            />
            <div class="app-suggestions" id="appSuggestions"></div>
            <div class="hint-text">Press Enter to chat • Esc to dismiss</div>
        </div>
    </div>

    <script>
        // Wait for Tauri to be ready
        function initApp() {
            console.log('initApp called, checking Tauri...');
            console.log('window.__TAURI__:', window.__TAURI__);
            
            if (!window.__TAURI__ || !window.__TAURI__.tauri || !window.__TAURI__.window) {
                console.log('Tauri not ready, retrying in 50ms...');
                setTimeout(initApp, 50);
                return;
            }
            
            console.log('Tauri ready! Initializing...');
            
            const { invoke } = window.__TAURI__.tauri;
            const { appWindow } = window.__TAURI__.window;
            
            console.log('invoke:', invoke);
            console.log('appWindow:', appWindow);
            
            const input = document.getElementById('promptInput');
            const appSuggestions = document.getElementById('appSuggestions');
            
            console.log('input element:', input);
            console.log('appSuggestions element:', appSuggestions);
            
            let currentMatches = [];
            let selectedIndex = -1;
            let searchTimeout = null;
            
            // Handle input changes for live search
            input.addEventListener('input', async (event) => {
                const query = input.value.trim();
                console.log('Input changed:', query);
                
                // Clear previous timeout
                if (searchTimeout) {
                    clearTimeout(searchTimeout);
                }
                
                if (query.length === 0) {
                    appSuggestions.classList.remove('visible');
                    currentMatches = [];
                    selectedIndex = -1;
                    return;
                }
                
                // Debounce search
                searchTimeout = setTimeout(async () => {
                    console.log('Searching for apps:', query);
                    try {
                        const result = await invoke('handle_floating_input', { input: query });
                        console.log('Search result:', result);
                        
                        if (result.startsWith('multiple:')) {
                            // Multiple matches - parse JSON
                            const jsonStr = result.substring(9);
                            const apps = JSON.parse(jsonStr);
                            console.log('Found apps:', apps);
                            
                            if (apps.length > 0) {
                                currentMatches = apps;
                                selectedIndex = 0;
                                renderSuggestions(apps);
                            } else {
                                appSuggestions.classList.remove('visible');
                                currentMatches = [];
                                selectedIndex = -1;
                            }
                        } else if (result.startsWith('launched:')) {
                            // Single match found - parse JSON
                            const jsonStr = result.substring(9);
                            const apps = JSON.parse(jsonStr);
                            console.log('Single match found:', apps);
                            currentMatches = apps;
                            selectedIndex = 0;
                            renderSuggestions(apps);
                        } else {
                            // No app matches
                            console.log('No app matches');
                            appSuggestions.classList.remove('visible');
                            currentMatches = [];
                            selectedIndex = -1;
                        }
                    } catch (error) {
                        console.error('Error searching apps:', error);
                    }
                }, 150);
            });
            
            function renderSuggestions(apps) {
                console.log('Rendering suggestions:', apps);
                appSuggestions.innerHTML = '';
                
                apps.forEach((app, index) => {
                    const item = document.createElement('div');
                    item.className = 'app-suggestion-item';
                    if (index === selectedIndex) {
                        item.classList.add('selected');
                    }
                    
                    // Check if app has an icon_path
                    let iconHtml;
                    if (app.icon_path) {
                        // Use Tauri's convertFileSrc to convert the path to a usable URL
                        const iconUrl = window.__TAURI__.tauri.convertFileSrc(app.icon_path);
                        iconHtml = `<img src="${iconUrl}" class="app-icon-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                                    <div class="app-icon" style="display:none;">${app.name.charAt(0).toUpperCase()}</div>`;
                    } else {
                        // Fallback to first letter
                        const firstLetter = app.name.charAt(0).toUpperCase();
                        iconHtml = `<div class="app-icon">${firstLetter}</div>`;
                    }
                    
                    item.innerHTML = `
                        ${iconHtml}
                        <div class="app-name">${app.name}</div>
                    `;
                    
                    item.addEventListener('click', async () => {
                        await launchApp(app.name);
                    });
                    
                    appSuggestions.appendChild(item);
                });
                
                appSuggestions.classList.add('visible');
                console.log('Suggestions rendered and visible');
            }
            
            async function launchApp(appName) {
                console.log('Launching app:', appName);
                try {
                    await invoke('launch_app_by_name', { appName });
                    input.value = '';
                    appSuggestions.classList.remove('visible');
                    currentMatches = [];
                    selectedIndex = -1;
                } catch (error) {
                    console.error('Error launching app:', error);
                }
            }
            
            function updateSelection() {
                const items = appSuggestions.querySelectorAll('.app-suggestion-item');
                items.forEach((item, index) => {
                    if (index === selectedIndex) {
                        item.classList.add('selected');
                        item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }
            
            // Handle keyboard navigation
            input.addEventListener('keydown', async (event) => {
                console.log('Key pressed:', event.key);
                
                // Arrow key navigation
                if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    if (currentMatches.length > 0) {
                        selectedIndex = (selectedIndex + 1) % currentMatches.length;
                        updateSelection();
                    }
                    return;
                } else if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    if (currentMatches.length > 0) {
                        selectedIndex = selectedIndex <= 0 ? currentMatches.length - 1 : selectedIndex - 1;
                        updateSelection();
                    }
                    return;
                }
                
                // Escape key
                if (event.key === 'Escape') {
                    console.log('Escape pressed');
                    // Hide window immediately
                    await appWindow.hide();
                }
                
                // Enter key
                else if (event.key === 'Enter') {
                    console.log('Enter pressed');
                    const message = input.value.trim();
                    if (message) {
                        console.log('Message:', message);
                        // If there are suggestions and one is selected, launch it
                        if (currentMatches.length > 0 && selectedIndex >= 0) {
                            console.log('Launching selected app');
                            event.preventDefault();
                            await launchApp(currentMatches[selectedIndex].name);
                            return;
                        }
                        
                        try {
                            console.log('Calling handle_floating_input');
                            const result = await invoke('handle_floating_input', { input: message });
                            console.log('Result:', result);
                            
                            if (result.startsWith('launched:')) {
                                const jsonStr = result.substring(9);
                                const apps = JSON.parse(jsonStr);
                                console.log('Launched application:', apps[0].name);
                                await invoke('launch_app_by_name', { appName: apps[0].name });
                                input.value = '';
                                appSuggestions.classList.remove('visible');
                                currentMatches = [];
                                selectedIndex = -1;
                            } else if (result.startsWith('multiple:')) {
                                const jsonStr = result.substring(9);
                                const apps = JSON.parse(jsonStr);
                                const appToLaunch = selectedIndex >= 0 ? apps[selectedIndex].name : apps[0].name;
                                console.log('Launching first match:', appToLaunch);
                                await invoke('launch_app_by_name', { appName: appToLaunch });
                                input.value = '';
                                appSuggestions.classList.remove('visible');
                                currentMatches = [];
                                selectedIndex = -1;
                            } else if (result === 'chat') {
                                console.log('Opening chat');
                                await invoke('open_chat_with_message', { message });
                                input.value = '';
                                appSuggestions.classList.remove('visible');
                                currentMatches = [];
                                selectedIndex = -1;
                            }
                        } catch (error) {
                            console.error('Error handling input:', error);
                            try {
                                await invoke('open_chat_with_message', { message });
                                input.value = '';
                                appSuggestions.classList.remove('visible');
                                currentMatches = [];
                                selectedIndex = -1;
                            } catch (chatError) {
                                console.error('Error opening chat:', chatError);
                            }
                        }
                    }
                }
            });
            
            // Handle click outside to dismiss
            document.addEventListener('click', async (event) => {
                const container = document.querySelector('.floating-container');
                if (container && !container.contains(event.target)) {
                    await appWindow.hide();
                }
            });
            
            // Focus input when window becomes visible
            appWindow.listen('tauri://focus', () => {
                setTimeout(() => {
                    input.value = '';
                    appSuggestions.classList.remove('visible');
                    currentMatches = [];
                    selectedIndex = -1;
                    input.focus();
                }, 50);
            });
            
            // Auto-focus on load
            setTimeout(() => input.focus(), 100);
            
            console.log('Initialization complete!');
        }
        
        // Start initialization
        console.log('Script loaded, document.readyState:', document.readyState);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
