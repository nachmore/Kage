<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    <script type="module">
        // Import Tauri API
        import { invoke } from 'https://unpkg.com/@tauri-apps/api@1/tauri';
        import { appWindow } from 'https://unpkg.com/@tauri-apps/api@1/window';
        
        window.__KIRO_TAURI__ = { invoke, appWindow };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .floating-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.2s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .ghost-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .ghost-icon {
            font-size: 40px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
        
        .speech-bubble {
            position: relative;
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            min-width: 300px;
            max-width: 400px;
        }
        
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid white;
        }
        
        .input-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #333;
            transition: all 0.2s;
        }
        
        .input-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-box::placeholder {
            color: #9ca3af;
        }
        
        .hint-text {
            margin-top: 8px;
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
        }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            padding: 4px;
            display: none;
            z-index: 1000;
            min-width: 150px;
        }
        
        .context-menu-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            transition: background 0.1s;
        }
        
        .context-menu-item:hover {
            background: #f3f4f6;
        }
    </style>
</head>
<body>
    <div class="floating-container">
        <div class="ghost-container">
            <div class="ghost-icon">👻</div>
        </div>
        
        <div class="speech-bubble">
            <input 
                type="text" 
                class="input-box" 
                id="promptInput" 
                placeholder="Ask me anything..."
                autofocus
            />
            <div class="hint-text">Press Enter to chat • Esc to dismiss</div>
        </div>
    </div>
    
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="openSettings()">⚙️ Settings</div>
    </div>

    <script>
        // Wait for our custom Tauri import
        function initializeTauri(attempt = 0) {
            console.log(`Attempt ${attempt + 1}: Checking Tauri...`);
            
            // Check for our custom import
            if (window.__KIRO_TAURI__ && window.__KIRO_TAURI__.invoke && window.__KIRO_TAURI__.appWindow) {
                console.log('Successfully loaded Tauri APIs via module import!');
                setupEventHandlers(window.__KIRO_TAURI__.invoke, window.__KIRO_TAURI__.appWindow);
                return;
            }
            
            // Fallback: check standard Tauri
            if (!window.__TAURI__) {
                if (attempt < 20) {
                    setTimeout(() => initializeTauri(attempt + 1), 100);
                }
                return;
            }
            
            console.log('Tauri object:', window.__TAURI__);
            console.log('Tauri keys:', Object.keys(window.__TAURI__));
            
            // Try different API access patterns
            let invoke, appWindow;
            
            // Pattern 1: window.__TAURI__.tauri.invoke
            if (window.__TAURI__.tauri && window.__TAURI__.tauri.invoke) {
                invoke = window.__TAURI__.tauri.invoke;
                console.log('Found invoke via tauri.invoke');
            }
            // Pattern 2: window.__TAURI__.invoke
            else if (window.__TAURI__.invoke) {
                invoke = window.__TAURI__.invoke;
                console.log('Found invoke directly');
            }
            
            // Pattern 1: window.__TAURI__.window.appWindow
            if (window.__TAURI__.window && window.__TAURI__.window.appWindow) {
                appWindow = window.__TAURI__.window.appWindow;
                console.log('Found appWindow via window.appWindow');
            }
            // Pattern 2: window.__TAURI__.window.getCurrent()
            else if (window.__TAURI__.window && window.__TAURI__.window.getCurrent) {
                appWindow = window.__TAURI__.window.getCurrent();
                console.log('Found appWindow via getCurrent()');
            }
            // Pattern 3: Direct appWindow
            else if (window.__TAURI__.appWindow) {
                appWindow = window.__TAURI__.appWindow;
                console.log('Found appWindow directly');
            }
            
            if (!invoke || !appWindow) {
                console.error('Could not find invoke or appWindow');
                if (attempt < 20) {
                    setTimeout(() => initializeTauri(attempt + 1), 100);
                }
                return;
            }
            
            console.log('Successfully loaded Tauri APIs!');
            setupEventHandlers(invoke, appWindow);
        }
        
        function setupEventHandlers(invoke, appWindow) {
            const input = document.getElementById('promptInput');
            const contextMenu = document.getElementById('contextMenu');
            
            // Handle right-click to show context menu
            document.addEventListener('contextmenu', (event) => {
                event.preventDefault();
                contextMenu.style.display = 'block';
                contextMenu.style.left = event.clientX + 'px';
                contextMenu.style.top = event.clientY + 'px';
            });
            
            // Handle clicks
            document.addEventListener('click', async (event) => {
                console.log('Click detected');
                // Hide context menu if it's open
                if (contextMenu.style.display === 'block') {
                    contextMenu.style.display = 'none';
                    if (event.target.classList.contains('context-menu-item')) {
                        return;
                    }
                }
                
                // Check if click is outside the floating container
                const container = document.querySelector('.floating-container');
                const isOutside = container && !container.contains(event.target);
                if (isOutside) {
                    console.log('Hiding window due to outside click');
                    try {
                        await appWindow.hide();
                    } catch (error) {
                        console.error('Error hiding window:', error);
                    }
                }
            });
            
            async function openSettings() {
                await invoke('open_settings_window');
            }
            
            window.openSettings = openSettings;
            
            // Handle Escape key on input
            input.addEventListener('keydown', async (event) => {
                console.log('Key pressed:', event.key);
                if (event.key === 'Escape') {
                    console.log('Escape pressed, hiding window');
                    try {
                        await appWindow.hide();
                    } catch (error) {
                        console.error('Error hiding window:', error);
                    }
                } else if (event.key === 'Enter') {
                    const message = input.value.trim();
                    if (message) {
                        try {
                            await invoke('open_chat_with_message', { message });
                            input.value = '';
                        } catch (error) {
                            console.error('Error opening chat:', error);
                        }
                    }
                }
            });
            
            // Handle input blur
            input.addEventListener('blur', async () => {
                console.log('Input lost focus');
                setTimeout(async () => {
                    if (!document.hasFocus()) {
                        console.log('Hiding window due to blur');
                        try {
                            await appWindow.hide();
                        } catch (error) {
                            console.error('Error hiding window:', error);
                        }
                    }
                }, 150);
            });
            
            // Focus input when window becomes visible
            if (appWindow.listen) {
                appWindow.listen('tauri://focus', () => {
                    setTimeout(() => input.focus(), 50);
                });
            }
            
            // Auto-focus on load
            setTimeout(() => input.focus(), 100);
        }
        
        // Start initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => initializeTauri());
        } else {
            initializeTauri();
        }
    </script>
</body>
</html>
