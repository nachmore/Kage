<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro</title>
    <script src="https://unpkg.com/@tauri-apps/api@1"></script>
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for diagram rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        
        .floating-container {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 0;
            animation: fadeIn 0.2s ease-out;
            width: 100%;
            height: 100%;
            min-width: 500px;
            min-height: 60px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .ghost-container {
            width: 60px;
            min-width: 60px;
            background: linear-gradient(135deg, #8FCDFC 0%, #C09CFF 100%);
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .ghost-icon {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
            transition: transform 0.3s ease;
        }
        
        .ghost-container.thinking .ghost-icon {
            animation: thinking-float 2.5s ease-in-out infinite;
        }
        
        @keyframes thinking-float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg) scaleX(1);
            }
            15% {
                transform: translateY(-8px) translateX(-3px) rotate(-5deg) scaleX(1);
            }
            35% {
                transform: translateY(-12px) translateX(2px) rotate(3deg) scaleX(-1);
            }
            50% {
                transform: translateY(-8px) translateX(4px) rotate(5deg) scaleX(-1);
            }
            65% {
                transform: translateY(-12px) translateX(2px) rotate(2deg) scaleX(-1);
            }
            85% {
                transform: translateY(-8px) translateX(-3px) rotate(-4deg) scaleX(1);
            }
            100% {
                transform: translateY(0) translateX(0) rotate(0deg) scaleX(1);
            }
        }
        
        .speech-bubble {
            position: relative;
            background: white;
            border-radius: 0 12px 12px 0;
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 60px;
            overflow: hidden;
        }
        
        /* Resize handle indicator */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, transparent 50%, #d1d5db 50%);
            cursor: nwse-resize;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .speech-bubble:hover::after {
            opacity: 0.8;
        }
        
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }
        
        .content-area.visible {
            display: block;
        }
        
        .response-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
        }
        
        .input-container {
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .input-box {
            flex: 1;
            padding: 10px 12px;
            border: none;
            font-size: 14px;
            color: #333;
            background: transparent;
            resize: none;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .input-box:focus {
            outline: none;
        }
        
        .input-box::placeholder {
            color: #9ca3af;
        }
        
        .expand-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            display: none;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            transition: all 0.2s;
        }
        
        .expand-btn.visible {
            display: flex;
        }
        
        .expand-btn:hover {
            background: #f3f4f6;
            color: #8E48FF;
        }
        
        .loading-dots {
            display: flex;
            padding: 20px;
            justify-content: center;
            align-items: center;
            gap: 8px;
            display: none;
        }
        
        .loading-dots.visible {
            display: flex;
        }
        
        .loading-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8FCDFC 0%, #C09CFF 100%);
            animation: dot-bounce 1.4s ease-in-out infinite;
        }
        
        .loading-dot:nth-child(1) {
            animation-delay: 0s;
        }
        
        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes dot-bounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-15px);
                opacity: 1;
            }
        }
        
        /* Static ghost blinking - random timing */
        .ghost-icon .ghost-eye {
            transform-origin: center;
            transform-box: fill-box;
            animation: kiro-static-blink 3.5s ease-in-out infinite;
        }
        
        .ghost-icon .ghost-eye-right {
            animation-delay: 0.1s;
        }
        
        @keyframes kiro-static-blink {
            0%, 88%, 100% {
                transform: scaleY(1);
            }
            90%, 92% {
                transform: scaleY(0.1);
            }
        }
        
        /* When thinking, keep blinking */
        .ghost-container.thinking .ghost-icon .ghost-eye {
            transform-origin: center;
            transform-box: fill-box;
            animation: kiro-static-blink 3.5s ease-in-out infinite;
        }
        
        .app-suggestions {
            background: white;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            border-top: 1px solid #e5e7eb;
        }
        
        .app-suggestions.visible {
            display: block;
        }
        
        .app-suggestion-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .app-suggestion-item:last-child {
            border-bottom: none;
        }
        
        .app-suggestion-item:hover,
        .app-suggestion-item.selected {
            background: #f3f4f6;
        }
        
        .app-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: linear-gradient(135deg, #8FCDFC 0%, #C09CFF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #19161D;
            flex-shrink: 0;
        }
        
        .app-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
        }
        
        .app-name {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        /* Dark Theme Support */
        body.dark-theme .speech-bubble {
            background: #28242E;
            color: #E5E7EB;
        }
        
        body.dark-theme .speech-bubble::after {
            background: linear-gradient(135deg, transparent 50%, #4A464F 50%);
        }
        
        body.dark-theme .response-text {
            color: #E5E7EB;
        }
        
        body.dark-theme .input-container {
            border-top-color: #4A464F;
        }
        
        body.dark-theme .input-box {
            color: #E5E7EB;
            background: transparent;
        }
        
        body.dark-theme .input-box::placeholder {
            color: #938F9B;
        }
        
        body.dark-theme .expand-btn {
            color: #938F9B;
        }
        
        body.dark-theme .expand-btn:hover {
            background: #352F3D;
            color: #C09CFF;
        }
        
        body.dark-theme .app-suggestion-item {
            border-bottom-color: #352F3D;
        }
        
        body.dark-theme .app-suggestion-item:hover,
        body.dark-theme .app-suggestion-item.selected {
            background: #352F3D;
        }
        
        body.dark-theme .app-suggestions {
            background: #28242E;
            border-top-color: #4A464F;
        }
        
        body.dark-theme .app-name {
            color: #E5E7EB;
        }
        
        /* Code block styles */
        .code-block-wrapper {
            position: relative;
            margin: 12px 0;
            border-radius: 8px;
            overflow: hidden;
            background: #272822;
        }
        
        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #1e1e1e;
            border-bottom: 1px solid #3e3e3e;
        }
        
        .code-block-language {
            font-size: 12px;
            color: #a6e22e;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .copy-button {
            padding: 4px 12px;
            background: #3e3e3e;
            border: none;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .copy-button:hover {
            background: #4e4e4e;
            color: #fff;
        }
        
        .copy-button.copied {
            background: #a6e22e;
            color: #272822;
        }
        
        .code-block-wrapper pre {
            margin: 0;
            padding: 16px;
            overflow-x: auto;
            background: #272822;
        }
        
        .code-block-wrapper code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* Override Prism theme for better visibility */
        .code-block-wrapper pre[class*="language-"] {
            background: #272822;
            text-shadow: none;
        }
        
        body.dark-theme .code-block-wrapper {
            background: #1a1a1a;
        }
        
        body.dark-theme .code-block-header {
            background: #0d0d0d;
            border-bottom-color: #2a2a2a;
        }
        
        body.dark-theme .copy-button {
            background: #2a2a2a;
        }
        
        body.dark-theme .copy-button:hover {
            background: #3a3a3a;
        }
        
        /* Mermaid diagram styles */
        .mermaid-wrapper {
            position: relative;
            margin: 12px 0;
            border-radius: 8px;
            overflow: hidden;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }
        
        .mermaid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .mermaid-label {
            font-size: 12px;
            color: #6b7280;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .mermaid-wrapper .mermaid {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        
        body.dark-theme .mermaid-wrapper {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }
        
        body.dark-theme .mermaid-header {
            background: #0d0d0d;
            border-bottom-color: #2a2a2a;
        }
        
        body.dark-theme .mermaid-label {
            color: #a6e22e;
        }
        
        body.dark-theme .mermaid-wrapper .mermaid {
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="floating-container">
        <div class="ghost-container">
            <svg class="ghost-icon" viewBox="0 0 65 47" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5.71599 33.2597C21.3537 50.3579 43.692 49.7224 56.8482 37.6892C64.8725 30.3497 68.8862 13.8647 55.4115 3.72686C41.9368 -6.41103 32.4042 11.2128 17.2667 8.73447C14.1417 8.22797 9.94157 9.04188 12.6668 12.7323C13.1844 13.4347 13.8741 13.9921 14.4889 14.4572C10.198 14.6069 8.69922 14.3808 6.07118 14.3457C3.69479 14.2406 2.01125 14.368 1.05082 15.569C-0.207458 17.5201 3.17874 20.5431 6.24957 23.1473C8.02071 24.8452 9.81893 27.134 10.9737 29.0437C9.58639 28.7602 9.25032 28.6837 7.17973 28.4703C3.87477 28.131 1.42511 28.5658 5.71759 33.2597H5.71599Z" fill="white"/>
                <path class="ghost-eye ghost-eye-left" d="M48.5012 21.9388C46.3685 22.1093 45.8461 19.5864 45.7234 18.0669C45.6135 16.6955 45.7712 15.5853 46.1821 14.8574C46.5437 14.2172 47.1044 13.862 47.8482 13.8015C48.5936 13.7409 49.2578 14.0037 49.7579 14.5851C50.3281 15.2477 50.6865 16.3101 50.7948 17.6591C50.9986 20.2075 50.1417 21.8066 48.5012 21.9372V21.9388Z" fill="black"/>
                <path class="ghost-eye ghost-eye-right" d="M57.2707 21.2344C55.138 21.4048 54.614 18.8819 54.493 17.3624C54.3831 15.991 54.5407 14.8825 54.9517 14.153C55.3116 13.5127 55.8739 13.1575 56.6177 13.097C57.3631 13.0381 58.0273 13.2993 58.5274 13.8807C59.0976 14.5433 59.456 15.6056 59.5643 16.9547C59.7682 19.5031 58.9113 21.1022 57.2707 21.2328V21.2344Z" fill="black"/>
            </svg>
        </div>
        
        <div class="speech-bubble">
            <div class="loading-dots" id="loadingDots">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
            <div class="content-area" id="contentArea">
                <div class="response-text" id="responseText"></div>
            </div>
            <div class="input-container">
                <textarea 
                    class="input-box" 
                    id="promptInput" 
                    placeholder="Ask me anything..."
                    rows="1"
                    autofocus
                ></textarea>
                <button class="expand-btn" id="expandBtn" title="Open full chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m-3-3h6"/>
                    </svg>
                </button>
            </div>
            <div class="app-suggestions" id="appSuggestions"></div>
        </div>
    </div>

    <script>
        // Initialize Mermaid
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            }
        });
        
        // Markdown rendering with code block support
        function renderMarkdown(markdown, targetElement) {
            if (!markdown) {
                targetElement.innerHTML = '';
                return;
            }
            
            // Configure marked - don't use Prism in the highlight function
            marked.setOptions({
                breaks: true,
                gfm: true
            });
            
            // Parse markdown
            const html = marked.parse(markdown);
            targetElement.innerHTML = html;
            
            // Wrap code blocks with copy buttons or render mermaid
            const codeBlocks = targetElement.querySelectorAll('pre code');
            codeBlocks.forEach((codeBlock) => {
                const pre = codeBlock.parentElement;
                
                // Get language from class name
                const className = codeBlock.className;
                const langMatch = className.match(/language-(\w+)/);
                const language = langMatch ? langMatch[1] : 'text';
                
                // Check if this is a mermaid diagram
                if (language === 'mermaid') {
                    renderMermaidDiagram(codeBlock, pre);
                    return;
                }
                
                // Apply Prism highlighting manually
                if (language && language !== 'text') {
                    const code = codeBlock.textContent;
                    
                    // Check if language is loaded, if not try to load it
                    if (Prism.languages[language]) {
                        try {
                            const highlighted = Prism.highlight(code, Prism.languages[language], language);
                            codeBlock.innerHTML = highlighted;
                            codeBlock.className = `language-${language}`;
                        } catch (e) {
                            console.warn(`Failed to highlight ${language}:`, e);
                        }
                    } else {
                        console.log(`Language ${language} not loaded in Prism, available:`, Object.keys(Prism.languages));
                        // Trigger autoloader if available
                        if (window.Prism && window.Prism.plugins && window.Prism.plugins.autoloader) {
                            Prism.highlightElement(codeBlock);
                        }
                    }
                }
                
                // Create wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                // Create header with language and copy button
                const header = document.createElement('div');
                header.className = 'code-block-header';
                
                const langLabel = document.createElement('span');
                langLabel.className = 'code-block-language';
                langLabel.textContent = language;
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-button';
                copyBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span>Copy</span>
                `;
                copyBtn.onclick = () => copyCode(codeBlock.textContent, copyBtn);
                
                header.appendChild(langLabel);
                header.appendChild(copyBtn);
                
                // Wrap the pre element
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);
            });
        }
        
        async function renderMermaidDiagram(codeBlock, pre) {
            const code = codeBlock.textContent;
            
            // Create wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'mermaid-wrapper';
            
            // Create header
            const header = document.createElement('div');
            header.className = 'mermaid-header';
            
            const label = document.createElement('span');
            label.className = 'mermaid-label';
            label.textContent = 'Diagram';
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-button';
            copyBtn.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Copy</span>
            `;
            copyBtn.onclick = () => copyCode(code, copyBtn);
            
            header.appendChild(label);
            header.appendChild(copyBtn);
            
            // Create mermaid container
            const mermaidDiv = document.createElement('div');
            mermaidDiv.className = 'mermaid';
            mermaidDiv.textContent = code;
            
            // Replace pre with wrapper
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(header);
            wrapper.appendChild(mermaidDiv);
            pre.remove();
            
            // Render mermaid diagram
            try {
                await mermaid.run({
                    nodes: [mermaidDiv]
                });
            } catch (error) {
                console.error('Mermaid rendering error:', error);
                mermaidDiv.innerHTML = `<div style="color: #dc2626; padding: 20px;">Error rendering diagram: ${error.message}</div>`;
            }
        }
        
        function copyCode(code, button) {
            navigator.clipboard.writeText(code).then(() => {
                const originalHTML = button.innerHTML;
                button.classList.add('copied');
                button.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Copied!</span>
                `;
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy code:', err);
            });
        }
        
        // Wait for Tauri to be ready
        function initApp() {
            console.log('initApp called, checking Tauri...');
            console.log('window.__TAURI__:', window.__TAURI__);
            
            if (!window.__TAURI__ || !window.__TAURI__.tauri || !window.__TAURI__.window) {
                console.log('Tauri not ready, retrying in 50ms...');
                setTimeout(initApp, 50);
                return;
            }
            
            console.log('Tauri ready! Initializing...');
            
            const { invoke } = window.__TAURI__.tauri;
            const { appWindow } = window.__TAURI__.window;
            const { listen } = window.__TAURI__.event;
            
            console.log('invoke:', invoke);
            console.log('appWindow:', appWindow);
            console.log('listen:', listen);
            
            const input = document.getElementById('promptInput');
            const appSuggestions = document.getElementById('appSuggestions');
            const contentArea = document.getElementById('contentArea');
            const responseText = document.getElementById('responseText');
            const loadingDots = document.getElementById('loadingDots');
            const expandBtn = document.getElementById('expandBtn');
            const ghostContainer = document.querySelector('.ghost-container');
            
            console.log('input element:', input);
            console.log('appSuggestions element:', appSuggestions);
            
            let currentMatches = [];
            let selectedIndex = -1;
            let searchTimeout = null;
            let currentResponse = '';
            let isWaitingForResponse = false;
            let currentRequestId = 0; // Track current request to ignore old responses
            
            // Listen for streaming message chunks
            listen('message_chunk', (event) => {
                // Only process if we're still waiting for a response
                if (!isWaitingForResponse) {
                    console.log('Ignoring chunk from cancelled request');
                    return;
                }
                console.log('Received message chunk:', event.payload);
                currentResponse = event.payload;
                renderMarkdown(currentResponse, responseText);
            });
            
            // Listen for message completion
            listen('message_complete', async () => {
                // Only process if we're still waiting for a response
                if (!isWaitingForResponse) {
                    console.log('Ignoring completion from cancelled request');
                    return;
                }
                console.log('Message complete');
                stopThinking();
                
                // Render final markdown
                renderMarkdown(currentResponse, responseText);
                
                // Resize window for final content
                await resizeWindow();
                isWaitingForResponse = false;
            });
            
            // Listen for errors
            listen('message_error', async (event) => {
                // Only process if we're still waiting for a response
                if (!isWaitingForResponse) {
                    console.log('Ignoring error from cancelled request');
                    return;
                }
                console.error('Message error:', event.payload);
                stopThinking();
                currentResponse = 'Error: ' + event.payload;
                responseText.textContent = currentResponse;
                contentArea.classList.add('visible');
                expandBtn.classList.add('visible');
                
                // Resize window for error
                await resizeWindow();
                isWaitingForResponse = false;
            });
            
            // Function to resize window based on content
            async function resizeWindow() {
                try {
                    const container = document.querySelector('.floating-container');
                    const contentHeight = container.offsetHeight;
                    const width = 500;
                    
                    // Add some padding and ensure minimum height
                    const height = Math.max(60, Math.min(400, contentHeight + 10));
                    
                    await invoke('resize_floating_window', { width, height });
                } catch (error) {
                    console.error('Error resizing window:', error);
                }
            }
            
            // Dragging functionality
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            
            ghostContainer.addEventListener('mousedown', async (e) => {
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                
                try {
                    await invoke('start_drag_window');
                } catch (error) {
                    console.error('Error starting drag:', error);
                }
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            // Helper function to show thinking animation
            function startThinking() {
                ghostContainer.classList.add('thinking');
                loadingDots.classList.add('visible');
            }
            
            function stopThinking() {
                ghostContainer.classList.remove('thinking');
                loadingDots.classList.remove('visible');
            }
            
            // Auto-resize textarea
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
            
            // Handle input changes for live search
            input.addEventListener('input', async (event) => {
                const query = input.value.trim();
                
                // Clear previous timeout
                if (searchTimeout) {
                    clearTimeout(searchTimeout);
                }
                
                if (query.length === 0) {
                    appSuggestions.classList.remove('visible');
                    currentMatches = [];
                    selectedIndex = -1;
                    
                    // Reset window size
                    await resizeWindow();
                    return;
                }
                
                // Debounce search
                searchTimeout = setTimeout(async () => {
                    console.log('Searching for apps:', query);
                    try {
                        const result = await invoke('handle_floating_input', { input: query });
                        console.log('Search result:', result);
                        
                        if (result.startsWith('multiple:')) {
                            // Multiple matches - parse JSON
                            const jsonStr = result.substring(9);
                            const apps = JSON.parse(jsonStr);
                            console.log('Found apps:', apps);
                            
                            if (apps.length > 0) {
                                currentMatches = apps;
                                selectedIndex = 0;
                                renderSuggestions(apps);
                            } else {
                                appSuggestions.classList.remove('visible');
                                currentMatches = [];
                                selectedIndex = -1;
                                
                                // Reset window size
                                await resizeWindow();
                            }
                        } else if (result.startsWith('launched:')) {
                            // Single match found - parse JSON
                            const jsonStr = result.substring(9);
                            const apps = JSON.parse(jsonStr);
                            console.log('Single match found:', apps);
                            currentMatches = apps;
                            selectedIndex = 0;
                            renderSuggestions(apps);
                        } else {
                            // No app matches
                            console.log('No app matches');
                            appSuggestions.classList.remove('visible');
                            currentMatches = [];
                            selectedIndex = -1;
                        }
                    } catch (error) {
                        console.error('Error searching apps:', error);
                    }
                }, 150);
            });
            
            function renderSuggestions(apps) {
                console.log('Rendering suggestions:', apps);
                appSuggestions.innerHTML = '';
                
                apps.forEach((app, index) => {
                    const item = document.createElement('div');
                    item.className = 'app-suggestion-item';
                    if (index === selectedIndex) {
                        item.classList.add('selected');
                    }
                    
                    // Check if app has an icon_base64
                    let iconHtml;
                    if (app.icon_base64) {
                        // Use base64 data URL
                        iconHtml = `<img src="data:image/png;base64,${app.icon_base64}" class="app-icon-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                                    <div class="app-icon" style="display:none;">${app.name.charAt(0).toUpperCase()}</div>`;
                    } else {
                        // Fallback to first letter
                        const firstLetter = app.name.charAt(0).toUpperCase();
                        iconHtml = `<div class="app-icon">${firstLetter}</div>`;
                    }
                    
                    item.innerHTML = `
                        ${iconHtml}
                        <div class="app-name">${app.name}</div>
                    `;
                    
                    item.addEventListener('click', async () => {
                        await launchApp(app.name);
                    });
                    
                    appSuggestions.appendChild(item);
                });
                
                appSuggestions.classList.add('visible');
                console.log('Suggestions rendered and visible');
                
                // Resize window to fit suggestions
                setTimeout(() => resizeWindow(), 10);
            }
            
            async function launchApp(appName) {
                console.log('Launching app:', appName);
                try {
                    await invoke('launch_app_by_name', { appName });
                    input.value = '';
                    appSuggestions.classList.remove('visible');
                    currentMatches = [];
                    selectedIndex = -1;
                    
                    // Reset window size
                    await resizeWindow();
                } catch (error) {
                    console.error('Error launching app:', error);
                }
            }
            
            function updateSelection() {
                const items = appSuggestions.querySelectorAll('.app-suggestion-item');
                items.forEach((item, index) => {
                    if (index === selectedIndex) {
                        item.classList.add('selected');
                        item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }
            
            // Handle keyboard navigation
            input.addEventListener('keydown', async (event) => {
                
                // Arrow key navigation
                if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    if (currentMatches.length > 0) {
                        selectedIndex = (selectedIndex + 1) % currentMatches.length;
                        updateSelection();
                    }
                    return;
                } else if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    if (currentMatches.length > 0) {
                        selectedIndex = selectedIndex <= 0 ? currentMatches.length - 1 : selectedIndex - 1;
                        updateSelection();
                    }
                    return;
                }
                
                // Escape key
                if (event.key === 'Escape') {
                    console.log('Escape pressed');
                    // Hide window immediately
                    await appWindow.hide();
                }
                
                // Enter key
                else if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    
                    console.log('Enter pressed');
                    const message = input.value.trim();
                    if (message) {
                        // Allow interrupting current response with a new question
                        if (isWaitingForResponse) {
                            console.log('Interrupting current response with new question');
                            stopThinking();
                            isWaitingForResponse = false;
                        }
                        
                        console.log('Message:', message);
                        // If there are suggestions and one is selected, launch it
                        if (currentMatches.length > 0 && selectedIndex >= 0) {
                            console.log('Launching selected app');
                            await launchApp(currentMatches[selectedIndex].name);
                            return;
                        }
                        
                        // Clear input and show loading
                        input.value = '';
                        input.style.height = 'auto';
                        appSuggestions.classList.remove('visible');
                        currentMatches = [];
                        selectedIndex = -1;
                        contentArea.classList.remove('visible');
                        startThinking();
                        expandBtn.classList.remove('visible');
                        
                        // Reset window size
                        await resizeWindow();
                        
                        try {
                            console.log('Calling handle_floating_input');
                            const result = await invoke('handle_floating_input', { input: message });
                            console.log('Result:', result);
                            
                            if (result.startsWith('launched:')) {
                                const jsonStr = result.substring(9);
                                const apps = JSON.parse(jsonStr);
                                console.log('Launched application:', apps[0].name);
                                await invoke('launch_app_by_name', { appName: apps[0].name });
                                stopThinking();
                                
                                // Reset window size
                                await resizeWindow();
                            } else if (result.startsWith('multiple:')) {
                                const jsonStr = result.substring(9);
                                const apps = JSON.parse(jsonStr);
                                const appToLaunch = selectedIndex >= 0 ? apps[selectedIndex].name : apps[0].name;
                                console.log('Launching first match:', appToLaunch);
                                await invoke('launch_app_by_name', { appName: appToLaunch });
                                stopThinking();
                                
                                // Reset window size
                                await resizeWindow();
                            } else if (result === 'chat') {
                                console.log('Sending to chat for response');
                                // This is a chat message - show response in floating window
                                currentResponse = 'Thinking...';
                                responseText.textContent = currentResponse;
                                contentArea.classList.add('visible');
                                expandBtn.classList.add('visible');
                                isWaitingForResponse = true;
                                
                                // Resize window for content
                                await resizeWindow();
                                
                                // Send message to ACP backend
                                try {
                                    await invoke('send_message_streaming', { message: message });
                                } catch (error) {
                                    console.error('Error sending message:', error);
                                    stopThinking();
                                    currentResponse = 'Error: ' + error;
                                    responseText.textContent = currentResponse;
                                    isWaitingForResponse = false;
                                    
                                    // Resize window for error
                                    await resizeWindow();
                                }
                            }
                        } catch (error) {
                            console.error('Error handling input:', error);
                            stopThinking();
                            currentResponse = 'Error: ' + error;
                            responseText.textContent = currentResponse;
                            contentArea.classList.add('visible');
                            expandBtn.classList.add('visible');
                            
                            // Resize window for error
                            await resizeWindow();
                        }
                    }
                }
            });
            
            // Handle click outside to dismiss
            document.addEventListener('click', async (event) => {
                const container = document.querySelector('.floating-container');
                if (container && !container.contains(event.target)) {
                    await appWindow.hide();
                }
            });
            
            // Expand button click
            expandBtn.addEventListener('click', async () => {
                console.log('Expand button clicked');
                try {
                    await invoke('open_chat_window');
                    await appWindow.hide();
                } catch (error) {
                    console.error('Error opening chat window:', error);
                }
            });
            
            // Focus input when window becomes visible
            // Track visibility to only clear content when window is freshly shown
            let lastVisibilityState = false;
            
            // Listen for visibility changes
            setInterval(async () => {
                try {
                    const isVisible = await appWindow.isVisible();
                    
                    // Window just became visible (was hidden, now shown)
                    if (isVisible && !lastVisibilityState) {
                        setTimeout(() => {
                            input.value = '';
                            input.style.height = 'auto';
                            appSuggestions.classList.remove('visible');
                            currentMatches = [];
                            selectedIndex = -1;
                            contentArea.classList.remove('visible');
                            stopThinking();
                            expandBtn.classList.remove('visible');
                            currentResponse = '';
                            input.focus();
                        }, 50);
                    }
                    
                    lastVisibilityState = isVisible;
                } catch (error) {
                    // Ignore errors
                }
            }, 100);
            
            // Also handle focus events for keyboard focus
            appWindow.listen('tauri://focus', async () => {
                // Only focus input, don't clear content
                setTimeout(() => input.focus(), 50);
            });
            
            // Auto-focus on load
            setTimeout(() => input.focus(), 100);
            
            console.log('Initialization complete!');
        }
        
        // Apply theme based on system preference
        function applyTheme() {
            // TODO: Load theme from config
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.body.classList.toggle('dark-theme', prefersDark);
        }
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            document.body.classList.toggle('dark-theme', e.matches);
        });
        
        // Apply theme on load
        applyTheme();
        
        // Start initialization
        console.log('Script loaded, document.readyState:', document.readyState);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
