<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .connection-status {
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .connection-status.connected {
            color: #4ade80;
        }
        
        .connection-status.disconnected {
            color: #f87171;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        
        .messages-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            align-self: flex-end;
        }
        
        .message.assistant {
            align-self: flex-start;
        }
        
        .message-header {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .message.user .message-header {
            text-align: right;
        }
        
        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: rgba(74, 222, 128, 0.3);
            border: 1px solid rgba(74, 222, 128, 0.5);
        }
        
        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .message-placeholder {
            opacity: 0.5;
            font-style: italic;
            text-align: center;
            padding: 40px;
        }
        
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        .input-box {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        .input-box:focus {
            outline: none;
            background: white;
        }
        
        .send-button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            background: #4ade80;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-button:hover {
            background: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
        }
        
        .send-button:active {
            transform: translateY(0);
        }
        
        .send-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid #f87171;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #fecaca;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Kiro Assistant</h1>
        <div class="connection-status" id="connectionStatus">Checking connection...</div>
    </div>
    
    <div class="chat-container">
        <div id="errorContainer"></div>
        
        <div class="messages-area" id="messagesArea">
            <div class="message-placeholder">Start a conversation with Kiro...</div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                class="input-box" 
                id="messageInput" 
                placeholder="Type your message here..."
                onkeypress="handleKeyPress(event)"
            />
            <button class="send-button" id="sendButton" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.tauri;
        const { listen } = window.__TAURI__.event;
        
        let isConnected = false;
        let messages = [];
        let currentStreamingMessage = null;
        
        // Listen for streaming message chunks
        listen('message_chunk', (event) => {
            if (currentStreamingMessage) {
                const contentDiv = currentStreamingMessage.querySelector('.message-content');
                contentDiv.textContent = event.payload;
                
                // Scroll to bottom
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        });
        
        // Listen for message completion
        listen('message_complete', () => {
            if (currentStreamingMessage) {
                const contentDiv = currentStreamingMessage.querySelector('.message-content');
                messages.push({ role: 'assistant', content: contentDiv.textContent });
                currentStreamingMessage = null;
            }
            
            // Re-enable input
            const sendButton = document.getElementById('sendButton');
            const input = document.getElementById('messageInput');
            sendButton.disabled = false;
            input.disabled = false;
            input.focus();
        });
        
        // Listen for errors
        listen('message_error', (event) => {
            removeTypingIndicator();
            if (currentStreamingMessage) {
                currentStreamingMessage.remove();
                currentStreamingMessage = null;
            }
            showError(`Error: ${event.payload}`);
            isConnected = false;
            updateConnectionStatus();
            
            // Re-enable input
            const sendButton = document.getElementById('sendButton');
            const input = document.getElementById('messageInput');
            sendButton.disabled = false;
            input.disabled = false;
            input.focus();
        });
        
        async function checkConnection() {
            try {
                isConnected = await invoke('check_connection');
                updateConnectionStatus();
            } catch (error) {
                isConnected = false;
                updateConnectionStatus();
            }
        }
        
        function updateConnectionStatus() {
            const statusEl = document.getElementById('connectionStatus');
            if (isConnected) {
                statusEl.textContent = 'Connected to kiro-cli';
                statusEl.className = 'connection-status connected';
            } else {
                statusEl.textContent = 'Not connected to kiro-cli';
                statusEl.className = 'connection-status disconnected';
            }
        }
        
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 5000);
        }
        
        function addMessage(role, content, isTyping = false) {
            const messagesArea = document.getElementById('messagesArea');
            
            // Remove placeholder if it exists
            const placeholder = messagesArea.querySelector('.message-placeholder');
            if (placeholder) {
                placeholder.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';
            headerDiv.textContent = role === 'user' ? 'You' : 'Kiro';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isTyping) {
                contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(contentDiv);
            messagesArea.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            return messageDiv;
        }
        
        function removeTypingIndicator() {
            const messagesArea = document.getElementById('messagesArea');
            const typingMessages = messagesArea.querySelectorAll('.message.assistant');
            typingMessages.forEach(msg => {
                const content = msg.querySelector('.message-content');
                if (content && content.querySelector('.typing-indicator')) {
                    msg.remove();
                }
            });
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage('user', message);
            messages.push({ role: 'user', content: message });
            
            // Clear input and disable controls
            input.value = '';
            sendButton.disabled = true;
            input.disabled = true;
            
            // Remove any existing typing indicator and add new assistant message
            removeTypingIndicator();
            currentStreamingMessage = addMessage('assistant', '');
            
            try {
                await invoke('send_message_streaming', { message });
                isConnected = true;
                updateConnectionStatus();
            } catch (error) {
                removeTypingIndicator();
                currentStreamingMessage = null;
                showError(`Error: ${error}`);
                isConnected = false;
                updateConnectionStatus();
                
                // Re-enable input on error
                sendButton.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Check connection on load
        checkConnection();
        
        // Focus input on load
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
