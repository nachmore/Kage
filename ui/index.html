<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Assistant</title>

    <!-- Vendored Dependencies -->
    <link rel="stylesheet" href="vendor/lib/prism-themes/prism-okaidia.min.css">
    <script src="vendor/lib/prism.js"></script>
    <script src="vendor/lib/prism-components/prism-clike.min.js"></script>
    <script src="vendor/lib/prism-components/prism-javascript.min.js"></script>
    <script src="vendor/lib/prism-components/prism-typescript.min.js"></script>
    <script src="vendor/lib/prism-components/prism-python.min.js"></script>
    <script src="vendor/lib/prism-components/prism-csharp.min.js"></script>
    <script src="vendor/lib/prism-components/prism-java.min.js"></script>
    <script src="vendor/lib/prism-components/prism-rust.min.js"></script>
    <script src="vendor/lib/prism-components/prism-go.min.js"></script>
    <script src="vendor/lib/prism-components/prism-bash.min.js"></script>
    <script src="vendor/lib/prism-components/prism-json.min.js"></script>
    <script src="vendor/lib/prism-components/prism-markdown.min.js"></script>
    <script src="vendor/lib/prism-components/prism-sql.min.js"></script>
    <script src="vendor/lib/prism-components/prism-yaml.min.js"></script>
    <script src="vendor/lib/prism-components/prism-css.min.js"></script>
    <script src="vendor/lib/prism-components/prism-markup.min.js"></script>
    <script src="vendor/lib/marked.min.js"></script>
    <script src="vendor/lib/mermaid.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/shared-kiro-tokens.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/chat-dark.css">
</head>
<body>
    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="sidebar" id="chatSidebar">
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
            <div class="sidebar-header">
                <svg class="sidebar-logo" viewBox="0 0 65 47" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5.71599 33.2597C21.3537 50.3579 43.692 49.7224 56.8482 37.6892C64.8725 30.3497 68.8862 13.8647 55.4115 3.72686C41.9368 -6.41103 32.4042 11.2128 17.2667 8.73447C14.1417 8.22797 9.94157 9.04188 12.6668 12.7323C13.1844 13.4347 13.8741 13.9921 14.4889 14.4572C10.198 14.6069 8.69922 14.3808 6.07118 14.3457C3.69479 14.2406 2.01125 14.368 1.05082 15.569C-0.207458 17.5201 3.17874 20.5431 6.24957 23.1473C8.02071 24.8452 9.81893 27.134 10.9737 29.0437C9.58639 28.7602 9.25032 28.6837 7.17973 28.4703C3.87477 28.131 1.42511 28.5658 5.71759 33.2597H5.71599Z" fill="#C09CFF"/>
                    <path class="ghost-eye ghost-eye-left" d="M48.5012 21.9388C46.3685 22.1093 45.8461 19.5864 45.7234 18.0669C45.6135 16.6955 45.7712 15.5853 46.1821 14.8574C46.5437 14.2172 47.1044 13.862 47.8482 13.8015C48.5936 13.7409 49.2578 14.0037 49.7579 14.5851C50.3281 15.2477 50.6865 16.3101 50.7948 17.6591C50.9986 20.2075 50.1417 21.8066 48.5012 21.9372V21.9388Z" fill="white"/>
                    <path class="ghost-eye ghost-eye-right" d="M57.2707 21.2344C55.138 21.4048 54.614 18.8819 54.493 17.3624C54.3831 15.991 54.5407 14.8825 54.9517 14.153C55.3116 13.5127 55.8739 13.1575 56.6177 13.097C57.3631 13.0381 58.0273 13.2993 58.5274 13.8807C59.0976 14.5433 59.456 15.6056 59.5643 16.9547C59.7682 19.5031 58.9113 21.1022 57.2707 21.2328V21.2344Z" fill="white"/>
                </svg>
                <span class="sidebar-title">Kiro Assistant</span>
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="Toggle sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>

            <button class="new-session-btn" id="newSessionBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>

            <div class="session-search-container">
                <input type="text" class="session-search" id="sessionSearch" placeholder="Search sessions..." spellcheck="false">
            </div>

            <div class="session-list" id="sessionList">
                <div class="session-list-empty">No sessions yet</div>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-footer-btn" id="settingsBtn" title="Settings">
                    ⚙️ Settings
                </button>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="chat-main" style="position: relative;">
            <div class="chat-header">
                <button class="sidebar-toggle-btn sidebar-toggle-collapsed" id="sidebarToggleBtnCollapsed" title="Show sidebar" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="chat-header-title-group">
                    <span class="chat-header-title" id="chatHeaderTitle" title="Double-click to rename">New Chat</span>
                    <input class="chat-header-title-input" id="chatHeaderTitleInput" style="display: none;" maxlength="80">
                </div>
                <span class="chat-header-status" id="connectionStatus">Checking...</span>
            </div>

            <div id="errorContainer"></div>

            <div class="messages-area" id="messagesArea">
                <div class="message-placeholder">Start a conversation with Kiro...</div>
            </div>

            <div class="chat-input-container">
                <div class="chat-suggestions" id="chatSuggestions"></div>
                <div class="chat-input-wrapper">
                    <div class="attachment-preview-strip" id="attachmentPreviews"></div>
                    <textarea
                        class="chat-input"
                        id="chatInput"
                        placeholder="Type your message..."
                        rows="1"
                        dir="auto"
                        autofocus
                    ></textarea>
                    <button class="chat-send-btn" id="sendBtn" aria-label="Send message" title="Send message">
                        <svg class="send-icon" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M13.854 7.14576L8.85401 2.14576C8.65901 1.95076 8.34201 1.95076 8.14701 2.14576L3.14601 7.14576C2.95101 7.34076 2.95101 7.65776 3.14601 7.85276C3.34101 8.04776 3.65801 8.04776 3.85301 7.85276L7.99901 3.70676V13.4998C7.99901 13.7758 8.22301 13.9998 8.49901 13.9998C8.77501 13.9998 8.99901 13.7758 8.99901 13.4998V3.70676L13.145 7.85276C13.243 7.95076 13.371 7.99876 13.499 7.99876C13.627 7.99876 13.755 7.94976 13.853 7.85276C14.048 7.65776 14.048 7.34076 13.853 7.14576H13.854Z"/></svg>
                        <svg class="stop-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    </button>
                </div>
                <div class="chat-toolbar">
                    <div class="chat-toolbar-left">
                        <button class="chat-toolbar-btn" id="attachFileBtn" title="Attach file (contents sent as text)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                        </button>
                        <button class="chat-toolbar-btn" id="attachImageBtn" title="Attach image">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        </button>
                    </div>
                    <div class="chat-toolbar-right">
                        <span class="chat-context-indicator" id="contextIndicator" title="0% context used">
                            <canvas id="contextRing" width="16" height="16"></canvas>
                            <span id="contextPercent">--%</span>
                        </span>
                        <button class="chat-model-selector" id="modelSelector" title="Select model">
                            <span id="modelName">Loading...</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="chat-model-dropdown" id="modelDropdown" style="display:none"></div>
                    </div>
                </div>
                <input type="file" id="fileInput" style="display:none" multiple accept=".txt,.md,.json,.js,.ts,.py,.rs,.toml,.yaml,.yml,.xml,.html,.css,.csv,.log,.sh,.bat,.ps1,.cfg,.ini,.env,.sql,.go,.java,.c,.cpp,.h,.hpp,.rb,.php,.swift,.kt,.r,.m,.pl,.lua">
                <input type="file" id="imageInput" style="display:none" multiple accept="image/png,image/jpeg,image/gif,image/webp">
            </div>

            <!-- Image lightbox overlay -->
            <div class="image-lightbox" id="imageLightbox" style="display: none;">
                <img class="image-lightbox-img" id="lightboxImg" alt="Zoomed image">
            </div>

            <!-- Permission Modal — scoped to chat-main, not the whole window -->
            <div class="permission-modal-overlay chat-scoped" id="permissionModal" style="display: none;" data-session-id="">
                <div class="permission-modal">
                    <div class="permission-header">
                        <h3>Tool Permission Required</h3>
                    </div>
                    <div class="permission-body">
                        <div class="permission-tool-name" id="permissionToolName"></div>
                        <p class="permission-tool-title" id="permissionToolTitle"></p>
                        <p class="permission-description">The AI assistant wants to use this tool. Do you want to allow it?</p>
                        <div class="permission-warning">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 13A6 6 0 118 2a6 6 0 010 12zm-.5-9.5v5h1v-5h-1zm0 6v1h1v-1h-1z"/>
                            </svg>
                            <span>Only approve tools you trust</span>
                        </div>
                    </div>
                    <div class="permission-actions">
                        <button class="permission-btn permission-btn-deny-always" id="permissionDenyAlways">Always Deny</button>
                        <button class="permission-btn permission-btn-deny" id="permissionDeny">Deny</button>
                        <button class="permission-btn permission-btn-once" id="permissionOnce">Allow</button>
                        <button class="permission-btn permission-btn-always" id="permissionAlways">Always Allow</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Scripts -->
    <script type="module" src="js/chat-permissions.js"></script>
    <script type="module" src="js/chat-main.js"></script>
</body>
</html>
