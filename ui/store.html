<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Store</title>
    <link rel="stylesheet" href="css/shared-kage-tokens.css">
    <link rel="stylesheet" href="css/shared-kage-controls.css">
    <link rel="stylesheet" href="css/shared-components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--kage-font);
            background: var(--kage-bg);
            color: var(--kage-text);
            overflow: hidden;
        }
        /* Dark scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        body.light-theme ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
        body.light-theme ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
        .store-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .store-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--kage-border);
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: drag;
        }
        .store-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--kage-text-bright);
            flex: 1;
        }
        .store-header-settings {
            -webkit-app-region: no-drag;
            padding: 4px 8px;
            font-size: 14px;
            border: 1px solid var(--kage-border);
            border-radius: 6px;
            background: transparent;
            color: var(--kage-text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .store-header-settings:hover {
            border-color: var(--kage-accent);
            color: var(--kage-accent);
        }
        .store-tabs {
            display: flex;
            gap: 4px;
            padding: 0 20px;
            border-bottom: 1px solid var(--kage-border);
            -webkit-app-region: no-drag;
        }
        .store-tab {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--kage-text-muted);
            font-size: 13px;
            transition: all 0.15s;
        }
        .store-tab:hover { color: var(--kage-text); }
        .store-tab.active {
            color: var(--kage-accent);
            border-bottom-color: var(--kage-accent);
        }
        .store-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--kage-border-subtle);
        }
        .store-toolbar input {
            flex: 1;
            padding: 8px 12px;
            background: var(--kage-bg-input);
            border: 1px solid var(--kage-border);
            border-radius: 6px;
            color: var(--kage-text);
            font-size: 13px;
            outline: none;
        }
        .store-toolbar input:focus {
            border-color: var(--kage-accent);
            box-shadow: 0 0 0 2px var(--kage-accent-glow);
        }
        .store-filter-btn {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid var(--kage-border);
            background: transparent;
            color: var(--kage-text-muted);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .store-filter-btn:hover {
            border-color: var(--kage-accent);
            color: var(--kage-text);
        }
        .store-filter-btn.active {
            background: var(--kage-accent);
            border-color: var(--kage-accent);
            color: white;
        }
        .store-source-select {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid var(--kage-border);
            background: var(--kage-bg-input);
            color: var(--kage-text);
            cursor: pointer;
            outline: none;
        }
        .store-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .store-card {
            background: var(--kage-bg-elevated);
            border: 1px solid var(--kage-border);
            border-radius: 8px;
            padding: 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .store-card:hover {
            border-color: var(--kage-accent);
            box-shadow: 0 0 0 1px var(--kage-accent-glow);
        }
        .store-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .store-card-icon {
            font-size: 24px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--kage-bg-input);
            border-radius: 8px;
            flex-shrink: 0;
        }
        .store-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--kage-text-bright);
        }
        .store-card-author {
            font-size: 11px;
            color: var(--kage-text-muted);
        }
        .store-card-desc {
            font-size: 12px;
            color: var(--kage-text-muted);
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .store-card-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }
        .store-card-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }
        .store-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: var(--kage-bg-input);
            border-radius: 4px;
            color: var(--kage-text-muted);
        }
        .store-source-badge {
            font-size: 9px;
            padding: 2px 6px;
            background: var(--kage-accent);
            border-radius: 4px;
            color: white;
            opacity: 0.8;
        }
        .store-card-btn {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .store-card-btn.install {
            background: var(--kage-accent);
            color: white;
        }
        .store-card-btn.install:hover {
            background: var(--kage-accent-hover);
        }
        .store-card-btn.installed {
            background: var(--kage-bg-input);
            color: var(--kage-text-muted);
            cursor: default;
        }
        .store-card-btn.uninstall {
            background: transparent;
            color: #e55;
            border: 1px solid #e55;
            font-size: 11px;
        }
        .store-card-btn.uninstall:hover {
            background: rgba(238, 85, 85, 0.1);
        }
        .store-card-btn.update {
            background: var(--kage-accent);
            color: white;
            font-size: 11px;
        }
        .store-card-btn.update:hover {
            background: var(--kage-accent-hover);
        }
        .store-card-btn.settings-link {
            background: transparent;
            color: var(--kage-text-muted);
            border: 1px solid var(--kage-border);
            font-size: 11px;
        }
        .store-card-btn.settings-link:hover {
            border-color: var(--kage-accent);
            color: var(--kage-accent);
        }
        .store-card-btn.reinstall {
            background: transparent;
            color: var(--kage-accent);
            border: 1px solid var(--kage-accent);
            font-size: 11px;
        }
        .store-card-btn.reinstall:hover {
            background: rgba(99, 102, 241, 0.1);
        }
        .store-card-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .store-empty {
            text-align: center;
            padding: 40px;
            color: var(--kage-text-muted);
        }
        .store-empty-icon { font-size: 32px; margin-bottom: 8px; }
        .store-offline-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 16px;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255, 196, 0, 0.08);
            border: 1px solid rgba(255, 196, 0, 0.4);
            color: var(--kage-text-primary);
            font-size: 13px;
        }
        .store-offline-banner-icon { font-size: 18px; }
        .store-offline-banner-text { flex: 1; line-height: 1.4; }
        .store-loading-spinner {
            width: 24px; height: 24px; margin: 0 auto 8px;
            border: 3px solid var(--kage-border);
            border-top-color: var(--kage-accent);
            border-radius: 50%;
            animation: store-spin 0.6s linear infinite;
        }
        @keyframes store-spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="store-container">
        <div class="store-header">
            <h1>🛍️ Extension Store</h1>
            <button class="store-header-settings" onclick="window.__kageStore.openSettings('store')" title="Store settings">⚙️</button>
        </div>
        <div class="store-tabs">
            <div class="store-tab active" data-tab="extensions" onclick="window.__kageStore.switchTab('extensions')">Extensions</div>
            <div class="store-tab" data-tab="themes" onclick="window.__kageStore.switchTab('themes')">Themes</div>
            <div class="store-tab" data-tab="commands" onclick="window.__kageStore.switchTab('commands')">Quick Commands</div>
        </div>
        <div class="store-toolbar">
            <input type="text" id="storeSearch" placeholder="Search..." oninput="window.__kageStore.onSearch()">
            <select class="store-source-select" id="sourceFilter" onchange="window.__kageStore.renderTab()" style="display:none">
                <option value="">All Sources</option>
            </select>
            <button class="store-filter-btn" id="installedFilter" onclick="window.__kageStore.toggleInstalledFilter()">Installed only</button>
        </div>
        <div class="store-content" id="storeContent"></div>
    </div>

    <script type="module" src="js/store.js"></script>
</body>
</html>
