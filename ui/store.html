<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Store</title>
    <link rel="stylesheet" href="css/shared-kiro-tokens.css">
    <link rel="stylesheet" href="css/shared-kiro-controls.css">
    <link rel="stylesheet" href="css/shared-components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--kiro-font);
            background: var(--kiro-bg);
            color: var(--kiro-text);
            overflow: hidden;
        }
        /* Dark scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        body.light-theme ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
        body.light-theme ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
        .store-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .store-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--kiro-border);
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: drag;
        }
        .store-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--kiro-text-bright);
            flex: 1;
        }
        .store-header-settings {
            -webkit-app-region: no-drag;
            padding: 4px 8px;
            font-size: 14px;
            border: 1px solid var(--kiro-border);
            border-radius: 6px;
            background: transparent;
            color: var(--kiro-text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .store-header-settings:hover {
            border-color: var(--kiro-accent);
            color: var(--kiro-accent);
        }
        .store-tabs {
            display: flex;
            gap: 4px;
            padding: 0 20px;
            border-bottom: 1px solid var(--kiro-border);
            -webkit-app-region: no-drag;
        }
        .store-tab {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--kiro-text-muted);
            font-size: 13px;
            transition: all 0.15s;
        }
        .store-tab:hover { color: var(--kiro-text); }
        .store-tab.active {
            color: var(--kiro-accent);
            border-bottom-color: var(--kiro-accent);
        }
        .store-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--kiro-border-subtle);
        }
        .store-toolbar input {
            flex: 1;
            padding: 8px 12px;
            background: var(--kiro-bg-input);
            border: 1px solid var(--kiro-border);
            border-radius: 6px;
            color: var(--kiro-text);
            font-size: 13px;
            outline: none;
        }
        .store-toolbar input:focus {
            border-color: var(--kiro-accent);
            box-shadow: 0 0 0 2px var(--kiro-accent-glow);
        }
        .store-filter-btn {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid var(--kiro-border);
            background: transparent;
            color: var(--kiro-text-muted);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .store-filter-btn:hover {
            border-color: var(--kiro-accent);
            color: var(--kiro-text);
        }
        .store-filter-btn.active {
            background: var(--kiro-accent);
            border-color: var(--kiro-accent);
            color: white;
        }
        .store-source-select {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid var(--kiro-border);
            background: var(--kiro-bg-input);
            color: var(--kiro-text);
            cursor: pointer;
            outline: none;
        }
        .store-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .store-card {
            background: var(--kiro-bg-elevated);
            border: 1px solid var(--kiro-border);
            border-radius: 8px;
            padding: 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .store-card:hover {
            border-color: var(--kiro-accent);
            box-shadow: 0 0 0 1px var(--kiro-accent-glow);
        }
        .store-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .store-card-icon {
            font-size: 24px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--kiro-bg-input);
            border-radius: 8px;
            flex-shrink: 0;
        }
        .store-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--kiro-text-bright);
        }
        .store-card-author {
            font-size: 11px;
            color: var(--kiro-text-muted);
        }
        .store-card-desc {
            font-size: 12px;
            color: var(--kiro-text-muted);
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .store-card-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }
        .store-card-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }
        .store-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: var(--kiro-bg-input);
            border-radius: 4px;
            color: var(--kiro-text-muted);
        }
        .store-source-badge {
            font-size: 9px;
            padding: 2px 6px;
            background: var(--kiro-accent);
            border-radius: 4px;
            color: white;
            opacity: 0.8;
        }
        .store-card-btn {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .store-card-btn.install {
            background: var(--kiro-accent);
            color: white;
        }
        .store-card-btn.install:hover {
            background: var(--kiro-accent-hover);
        }
        .store-card-btn.installed {
            background: var(--kiro-bg-input);
            color: var(--kiro-text-muted);
            cursor: default;
        }
        .store-card-btn.uninstall {
            background: transparent;
            color: #e55;
            border: 1px solid #e55;
            font-size: 11px;
        }
        .store-card-btn.uninstall:hover {
            background: rgba(238, 85, 85, 0.1);
        }
        .store-card-btn.update {
            background: var(--kiro-accent);
            color: white;
            font-size: 11px;
        }
        .store-card-btn.update:hover {
            background: var(--kiro-accent-hover);
        }
        .store-card-btn.settings-link {
            background: transparent;
            color: var(--kiro-text-muted);
            border: 1px solid var(--kiro-border);
            font-size: 11px;
        }
        .store-card-btn.settings-link:hover {
            border-color: var(--kiro-accent);
            color: var(--kiro-accent);
        }
        .store-card-btn.reinstall {
            background: transparent;
            color: var(--kiro-accent);
            border: 1px solid var(--kiro-accent);
            font-size: 11px;
        }
        .store-card-btn.reinstall:hover {
            background: rgba(99, 102, 241, 0.1);
        }
        .store-card-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .store-empty {
            text-align: center;
            padding: 40px;
            color: var(--kiro-text-muted);
        }
        .store-empty-icon { font-size: 32px; margin-bottom: 8px; }
        .store-loading-spinner {
            width: 24px; height: 24px; margin: 0 auto 8px;
            border: 3px solid var(--kiro-border);
            border-top-color: var(--kiro-accent);
            border-radius: 50%;
            animation: store-spin 0.6s linear infinite;
        }
        @keyframes store-spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="store-container">
        <div class="store-header">
            <h1>🛍️ Extension Store</h1>
            <button class="store-header-settings" onclick="openSettings('store')" title="Store settings">⚙️</button>
        </div>
        <div class="store-tabs">
            <div class="store-tab active" data-tab="extensions" onclick="switchTab('extensions')">Extensions</div>
            <div class="store-tab" data-tab="themes" onclick="switchTab('themes')">Themes</div>
            <div class="store-tab" data-tab="commands" onclick="switchTab('commands')">Quick Commands</div>
        </div>
        <div class="store-toolbar">
            <input type="text" id="storeSearch" placeholder="Search..." oninput="onSearch()">
            <select class="store-source-select" id="sourceFilter" onchange="renderTab()" style="display:none">
                <option value="">All Sources</option>
            </select>
            <button class="store-filter-btn" id="installedFilter" onclick="toggleInstalledFilter()">Installed only</button>
        </div>
        <div class="store-content" id="storeContent"></div>
    </div>

    <script>
    let currentTab = 'extensions';
    let showInstalledOnly = false;
    let installedMap = new Map(); // id → { version, kind }
    let _bundledIds = new Set();
    let _isDevMode = false;
    let _storeSources = []; // available source names from catalog response
    let _hasMultipleSources = false;

    function waitForTauri(cb) {
        if (window.__TAURI__?.core) cb();
        else setTimeout(() => waitForTauri(cb), 50);
    }

    waitForTauri(async () => {
        const invoke = window.__TAURI__.core.invoke;

        // Check dev mode
        try { _isDevMode = await invoke('is_dev_mode'); } catch {}

        // Load bundled extension IDs
        try {
            const resp = await fetch('extensions/bundled.json');
            if (resp.ok) {
                const list = await resp.json();
                for (const e of list) _bundledIds.add(e.id);
            }
        } catch {}

        // Apply theme
        try {
            const config = await invoke('get_config');
            if (config.ui?.theme === 'light') document.body.classList.add('light-theme');
            else if (config.ui?.theme === 'system' && !window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('light-theme');
            }
            // Check if multiple sources configured
            _hasMultipleSources = (config.store_sources || []).filter(s => s.enabled).length > 0;
        } catch {}

        // Initial tab from URL param
        const urlParams = new URLSearchParams(window.location.search);
        const initialTab = urlParams.get('tab');

        await refreshInstalled();

        // Auto-update check on store open
        try {
            const config = await invoke('get_config');
            if (config.auto_update_extensions) {
                autoUpdateCheck();
            }
        } catch {}

        if (initialTab && ['extensions', 'themes', 'commands'].includes(initialTab)) {
            switchTab(initialTab);
        } else {
            renderTab();
        }
    });

    async function refreshInstalled() {
        const invoke = window.__TAURI__.core.invoke;
        installedMap = new Map();
        try {
            const exts = await invoke('list_extensions');
            exts.forEach(e => installedMap.set(e.manifest.id, { version: e.manifest.version, kind: 'extension', hasSettings: !!e.manifest.contributes?.settingsModule }));
        } catch {}
        try {
            const themes = await invoke('list_themes');
            themes.forEach(e => installedMap.set(e.manifest.id, { version: e.manifest.version, kind: 'theme', hasSettings: false }));
        } catch {}
        try {
            const packs = await invoke('list_command_packs');
            packs.forEach(e => installedMap.set(e.manifest.id, { version: e.manifest.version, kind: 'commands', hasSettings: false }));
        } catch {}
        _bundledIds.forEach(id => {
            if (!installedMap.has(id)) installedMap.set(id, { version: '0.0.0', kind: 'extension', hasSettings: false });
        });
    }

    function hasUpdate(itemId, remoteVersion) {
        const local = installedMap.get(itemId);
        if (!local) return false;
        try {
            const lv = local.version.split('.').map(Number);
            const rv = remoteVersion.split('.').map(Number);
            for (let i = 0; i < 3; i++) {
                if ((rv[i] || 0) > (lv[i] || 0)) return true;
                if ((rv[i] || 0) < (lv[i] || 0)) return false;
            }
        } catch {}
        return false;
    }

    async function autoUpdateCheck() {
        const invoke = window.__TAURI__.core.invoke;
        try {
            const result = await invoke('check_extension_updates');
            if (result.updated > 0) {
                await refreshInstalled();
                renderTab();
            }
        } catch {}
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.store-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === tab);
        });
        renderTab();
    }

    function toggleInstalledFilter() {
        showInstalledOnly = !showInstalledOnly;
        document.getElementById('installedFilter').classList.toggle('active', showInstalledOnly);
        renderTab();
    }

    function renderTab() {
        const content = document.getElementById('storeContent');
        content.innerHTML = '<div class="store-empty"><div class="store-loading-spinner"></div>Loading...</div>';
        renderBrowse(content, currentTab);
    }

    async function renderBrowse(container, type) {
        const invoke = window.__TAURI__.core.invoke;
        const search = document.getElementById('storeSearch')?.value || '';
        const kind = type === 'commands' ? 'commands' : type === 'themes' ? 'theme' : 'extension';
        const sourceFilter = document.getElementById('sourceFilter')?.value || '';

        try {
            const catalog = await invoke('store_get_catalog', {
                kind,
                search: search || null,
                page: 1,
                source: sourceFilter || null,
            });
            let items = catalog.items || [];

            // Update source filter dropdown
            const sources = catalog.sources || [];
            updateSourceFilter(sources);

            if (showInstalledOnly) {
                items = items.filter(i => installedMap.has(i.id));
            }

            if (items.length === 0) {
                const msg = showInstalledOnly
                    ? `No installed ${type} found.`
                    : `No ${type} found in the store.`;
                container.innerHTML = `<div class="store-empty"><div class="store-empty-icon">🔍</div>${msg}</div>`;
                return;
            }

            let html = '<div class="store-grid">';
            for (const item of items) {
                html += renderCard(item, kind);
            }
            html += '</div>';
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = `<div class="store-empty"><div class="store-empty-icon">⚠️</div>Could not connect to store.<br>${esc(String(e))}</div>`;
        }
    }

    function renderCard(item, kind) {
        const isInstalled = installedMap.has(item.id);
        const isBundled = _bundledIds.has(item.id);
        const updateAvailable = isInstalled && hasUpdate(item.id, item.version);
        const localInfo = installedMap.get(item.id);
        const itemSource = item._source || '';

        // Build action buttons
        let actionHtml = '';
        if (isBundled) {
            actionHtml = '<span class="store-card-btn installed">Built-in</span>';
        } else if (isInstalled) {
            const buttons = [];

            // Settings deep link (if extension has a settings module)
            if (localInfo?.hasSettings) {
                buttons.push(`<button class="store-card-btn settings-link" onclick="event.stopPropagation();openSettings('${esc(item.id)}')" title="Open settings">⚙️</button>`);
            }

            // Update button
            if (updateAvailable) {
                const localVer = localInfo?.version || '';
                buttons.push(`<button class="store-card-btn update" onclick="event.stopPropagation();updateItem('${esc(item.id)}')" title="${esc(localVer)} → ${esc(item.version)}">Update</button>`);
            }

            // Reinstall button (dev mode only)
            if (_isDevMode) {
                buttons.push(`<button class="store-card-btn reinstall" onclick="event.stopPropagation();reinstallItem('${esc(item.id)}')" title="Re-download and reinstall">🔄</button>`);
            }

            // Uninstall button
            buttons.push(`<button class="store-card-btn uninstall" onclick="event.stopPropagation();uninstallItem('${esc(item.id)}','${kind}')">Uninstall</button>`);

            actionHtml = `<div class="store-card-actions">${buttons.join('')}</div>`;
        } else {
            actionHtml = `<button class="store-card-btn install" onclick="event.stopPropagation();installFromStore('${esc(item.id)}')">Install</button>`;
        }

        // Source badge (only show when multiple sources exist)
        const sourceBadge = (_hasMultipleSources && itemSource)
            ? `<span class="store-source-badge">${esc(itemSource)}</span>`
            : '';

        return `
            <div class="store-card">
                <div class="store-card-header">
                    <div class="store-card-icon">${esc(item.icon || '📦')}</div>
                    <div>
                        <div class="store-card-title">${esc(item.name)}</div>
                        <div class="store-card-author">${esc(item.author || '')} · v${esc(item.version)}</div>
                    </div>
                </div>
                <div class="store-card-tags">
                    ${sourceBadge}
                    ${(item.tags||[]).map(t => `<span class="store-tag">${esc(t)}</span>`).join('')}
                </div>
                <div class="store-card-desc">${esc(item.description || '')}</div>
                <div class="store-card-footer">
                    ${actionHtml}
                </div>
            </div>
        `;
    }

    function updateSourceFilter(sources) {
        const select = document.getElementById('sourceFilter');
        if (!select) return;
        if (sources.length <= 1) {
            select.style.display = 'none';
            _hasMultipleSources = false;
            return;
        }
        _hasMultipleSources = true;
        select.style.display = '';
        const current = select.value;
        select.innerHTML = '<option value="">All Sources</option>' +
            sources.map(s => `<option value="${esc(s)}"${s === current ? ' selected' : ''}>${esc(s)}</option>`).join('');
    }

    // --- Actions ---

    async function installFromStore(id) {
        const invoke = window.__TAURI__.core.invoke;
        try {
            await invoke('store_install', { id });
            await refreshInstalled();
            renderTab();
        } catch (e) {
            alert('Install failed: ' + e);
        }
    }

    async function updateItem(id) {
        await installFromStore(id);
    }

    async function reinstallItem(id) {
        const invoke = window.__TAURI__.core.invoke;
        try {
            // Just re-install (overwrites existing)
            await invoke('store_install', { id });
            await refreshInstalled();
            renderTab();
        } catch (e) {
            alert('Reinstall failed: ' + e);
        }
    }

    async function uninstallItem(id, kind) {
        if (!confirm(`Uninstall "${id}"?`)) return;
        const invoke = window.__TAURI__.core.invoke;
        try {
            await invoke('uninstall_extension', { id, kind });
            await refreshInstalled();
            renderTab();
        } catch (e) {
            alert('Uninstall failed: ' + e);
        }
    }

    function openSettings(extensionId) {
        const invoke = window.__TAURI__.core.invoke;
        invoke('open_settings_window', { section: extensionId });
    }

    let searchTimeout;
    function onSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => renderTab(), 300);
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'w') {
            e.preventDefault();
            window.__TAURI__?.webviewWindow?.getCurrentWebviewWindow()?.hide();
        }
    });
    </script>
</body>
</html>
