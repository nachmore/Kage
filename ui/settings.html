<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kage Settings</title>
    <!-- Vendored Dependencies (must load before app CSS — see floating.html) -->
    <link rel="stylesheet" href="vendor/lib/prism-themes/prism-okaidia.min.css">
    <script src="vendor/lib/prism.js"></script>
    <script src="vendor/lib/prism-components/prism-javascript.min.js"></script>
    <!-- App Styles -->
    <link rel="stylesheet" href="css/shared-kage-tokens.css">
    <link rel="stylesheet" href="css/shared-kage-controls.css">
    <link rel="stylesheet" href="css/shared-components.css">
    <link rel="stylesheet" href="css/settings-layout.css">
    <script>
        // Shared utilities — available to all settings modules
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function getToolEmoji(name) {
            const lower = (name || '').toLowerCase();
            if (lower.startsWith('ext:')) return '🧩';
            if (lower.includes('search')) return '🔍';
            if (lower.includes('fetch') || lower.includes('web')) return '🌐';
            if (lower.includes('read')) return '📖';
            if (lower.includes('write') || lower.includes('edit')) return '✏️';
            if (lower.includes('shell') || lower.includes('command') || lower.includes('terminal')) return '💻';
            if (lower.includes('aws') || lower.includes('cloud')) return '☁️';
            if (lower.includes('file')) return '📁';
            return '🔧';
        }
    </script>
    <style>
        /* Reset — kept inline since shared-base.css has light-theme defaults */
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <!-- Header removed — window title bar already shows "Settings - Kage" -->

    <div class="settings-container">
        <!-- Sidebar -->
        <div class="settings-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">User Experience</div>
                <div class="sidebar-item active" data-section="appearance" data-action="switchSection" data-arg="appearance">
                    <span class="sidebar-item-icon">🎨</span>
                    <span>Appearance</span>
                </div>
                <div class="sidebar-item" data-section="hotkey" data-action="switchSection" data-arg="hotkey">
                    <span class="sidebar-item-icon">🎹</span>
                    <span>Hotkey & Shortcuts</span>
                </div>
                <div class="sidebar-item" data-section="system" data-action="switchSection" data-arg="system">
                    <span class="sidebar-item-icon" id="systemSidebarIcon">🚀</span>
                    <span>Startup</span>
                </div>
                <div class="sidebar-item" data-section="speech" data-action="switchSection" data-arg="speech">
                    <span class="sidebar-item-icon">🎙️</span>
                    <span>Speech</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Kage AI</div>
                <div class="sidebar-item" data-section="personalization" data-action="switchSection" data-arg="personalization">
                    <span class="sidebar-item-icon">✨</span>
                    <span>Personalization</span>
                </div>
                <div class="sidebar-item" data-section="connection" data-action="switchSection" data-arg="connection">
                    <span class="sidebar-item-icon">🔌</span>
                    <span>Agent Connection</span>
                </div>
                <div class="sidebar-item" data-section="model" data-action="switchSection" data-arg="model">
                    <span class="sidebar-item-icon">🧠</span>
                    <span>Model</span>
                </div>
                <div class="sidebar-item" data-section="mcp" data-action="switchSection" data-arg="mcp">
                    <span class="sidebar-item-icon">🔌</span>
                    <span>MCP Servers</span>
                </div>
                <div class="sidebar-item" data-section="tool-permissions" data-action="switchSection" data-arg="tool-permissions">
                    <span class="sidebar-item-icon">🔧</span>
                    <span>Agent Permissions</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Automation</div>
                <div class="sidebar-item" data-section="integration" data-action="switchSection" data-arg="integration">
                    <span class="sidebar-item-icon" id="integrationSidebarIcon">🔗</span>
                    <span>System Integration</span>
                </div>
                <div class="sidebar-item" data-section="shortcuts" data-action="switchSection" data-arg="shortcuts">
                    <span class="sidebar-item-icon">⚡</span>
                    <span>Quick Commands</span>
                </div>
                <div class="sidebar-item" data-section="macros" data-action="switchSection" data-arg="macros">
                    <span class="sidebar-item-icon">🔄</span>
                    <span>Automations</span>
                </div>
            </div>
            <div class="sidebar-section" id="extensionsSidebarSection">
                <div class="sidebar-section-title">Extensions</div>
                <div class="sidebar-item" data-section="store" data-sidebar-store data-action="switchSection" data-arg="store">
                    <span class="sidebar-item-icon">🛍️</span>
                    <span>Extension Store</span>
                </div>
                <div class="sidebar-separator"></div>
                <!-- Extension sidebar items are added dynamically by manager.js -->
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">About</div>
                <div class="sidebar-item" data-section="updates" data-action="switchSection" data-arg="updates">
                    <span class="sidebar-item-icon">🔄</span>
                    <span>Updates</span>
                </div>
                <div class="sidebar-item" data-section="about" data-action="switchSection" data-arg="about">
                    <span class="sidebar-item-icon">ℹ️</span>
                    <span>About Kage</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="settings-content">

            <!-- Settings modules will be rendered here -->
            <div id="settingsModules"></div>
        </div>
    </div>

    <!-- Status Message -->
    <div id="statusMessage" class="status-message"></div>
    <!-- Save Button -->
    <div class="save-button-container">
        <button class="save-button" data-action="saveAndClose">Save &amp; Close</button>
    </div>

    <!-- Theme initialization for settings window -->
    <script src="js/shared/theme-global.js"></script>
    <script>
        // Thin wrappers so appearance.js can call these by name
        function applySettingsTheme(theme) { kageTheme.applyClasses(theme); }
        function refreshSettingsTheme(themeOverride) { return kageTheme.refresh(themeOverride); }

        // Apply theme on load
        (async function() {
            function waitForTauri(cb) {
                if (window.__TAURI__ && window.__TAURI__.core) cb();
                else setTimeout(() => waitForTauri(cb), 50);
            }
            waitForTauri(() => kageTheme.init());
        })();

        // Ctrl+W to close settings
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'w') {
                e.preventDefault();
                if (window.__TAURI__) {
                    window.__TAURI__.webviewWindow.getCurrentWebviewWindow().hide();
                }
            }
        });

        // Listen for navigation requests from other windows (e.g. floating → updates)
        (function() {
            function waitForTauri(cb) {
                if (window.__TAURI__ && window.__TAURI__.event) cb();
                else setTimeout(() => waitForTauri(cb), 50);
            }
            waitForTauri(() => {
                window.__TAURI__.event.listen('navigate_settings_section', (event) => {
                    const section = event.payload;
                    if (section && typeof switchSection === 'function') {
                        switchSection(section);
                    }
                });
                window.__TAURI__.event.listen('navigate_settings_subsection', (event) => {
                    const sub = event.payload;
                    if (sub) {
                        // Small delay to let the section switch render first
                        setTimeout(() => {
                            document.dispatchEvent(new CustomEvent('settings-subsection', { detail: sub }));
                        }, 100);
                    }
                });
            });
        })();
    </script>

    <script src="vendor/lib/marked.min.js"></script>
    
    <!-- Load all settings modules -->
    <script src="js/settings/actions.js"></script>
    <script src="js/settings/base.js"></script>
    <script>
        // Intercept console for settings window logging
        (function() {
            const invoke = () => window.__TAURI__?.core?.invoke;
            function fmt(v) {
                if (v === null || v === undefined) return String(v);
                if (v instanceof Error) return v.message + '\n' + (v.stack || '');
                if (typeof v === 'object') { try { return JSON.stringify(v); } catch { return String(v); } }
                return String(v);
            }
            const orig = { log: console.log.bind(console), warn: console.warn.bind(console), error: console.error.bind(console), debug: console.debug.bind(console) };
            console.log   = (...a) => { orig.log(...a);   const fn_ = invoke(); if (fn_) fn_('app_log_write', { level: 'info',  source: 'settings', msg: a.map(fmt).join(' ') }).catch(() => {}); };
            console.warn  = (...a) => { orig.warn(...a);  const fn_ = invoke(); if (fn_) fn_('app_log_write', { level: 'warn',  source: 'settings', msg: a.map(fmt).join(' ') }).catch(() => {}); };
            console.error = (...a) => { orig.error(...a); const fn_ = invoke(); if (fn_) fn_('app_log_write', { level: 'error', source: 'settings', msg: a.map(fmt).join(' ') }).catch(() => {}); };
            console.debug = (...a) => { orig.debug(...a); const fn_ = invoke(); if (fn_) fn_('app_log_write', { level: 'debug', source: 'settings', msg: a.map(fmt).join(' ') }).catch(() => {}); };
        })();
    </script>
    <script src="js/settings/hotkey.js"></script>
    <script src="js/settings/connection.js"></script>
    <script src="js/settings/appearance.js"></script>
    <script src="js/settings/system.js"></script>
    <script src="js/settings/assistant.js"></script>
    <script src="js/settings/model.js"></script>
    <script src="js/settings/shortcuts.js"></script>
    <script src="js/settings/automations.js"></script>
    <script src="js/settings/tool-permissions.js"></script>
    <script src="js/settings/mcp.js"></script>
    <script src="js/settings/integration.js"></script>
    <script src="js/settings/speech.js"></script>
    <script src="js/settings/store.js"></script>
    <!-- Extension settings modules are loaded dynamically by manager.js -->
    <script src="js/settings/about.js"></script>
    <script src="js/settings/updates.js"></script>
    <script type="module" src="js/settings/sandbox-bootstrap.js"></script>
    <script src="js/settings/manager.js"></script>
</body>
</html>
