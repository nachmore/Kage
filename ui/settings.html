<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Settings</title>
    <!-- Vendored Dependencies (must load before app CSS — see floating.html) -->
    <link rel="stylesheet" href="vendor/lib/prism-themes/prism-okaidia.min.css">
    <script src="vendor/lib/prism.js"></script>
    <script src="vendor/lib/prism-components/prism-javascript.min.js"></script>
    <!-- App Styles -->
    <link rel="stylesheet" href="css/shared-kiro-tokens.css">
    <link rel="stylesheet" href="css/shared-kiro-controls.css">
    <link rel="stylesheet" href="css/shared-components.css">
    <link rel="stylesheet" href="css/settings-layout.css">
    <script>
        // Shared utilities — available to all settings modules
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function getToolEmoji(name) {
            const lower = (name || '').toLowerCase();
            if (lower.includes('search')) return '🔍';
            if (lower.includes('fetch') || lower.includes('web')) return '🌐';
            if (lower.includes('read')) return '📖';
            if (lower.includes('write') || lower.includes('edit')) return '✏️';
            if (lower.includes('shell') || lower.includes('command') || lower.includes('terminal')) return '💻';
            if (lower.includes('aws') || lower.includes('cloud')) return '☁️';
            if (lower.includes('file')) return '📁';
            return '🔧';
        }
    </script>
    <style>
        /* Reset — kept inline since shared-base.css has light-theme defaults */
        * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <!-- Header removed — window title bar already shows "Settings - Kiro Assistant" -->

    <div class="settings-container">
        <!-- Sidebar -->
        <div class="settings-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">User Experience</div>
                <div class="sidebar-item active" data-section="appearance" onclick="switchSection('appearance')">
                    <span class="sidebar-item-icon">🎨</span>
                    <span>Appearance</span>
                </div>
                <div class="sidebar-item" data-section="hotkey" onclick="switchSection('hotkey')">
                    <span class="sidebar-item-icon">🎹</span>
                    <span>Hotkey & Shortcuts</span>
                </div>
                <div class="sidebar-item" data-section="system" onclick="switchSection('system')">
                    <span class="sidebar-item-icon" id="systemSidebarIcon">🚀</span>
                    <span>Startup</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Kiro AI</div>
                <div class="sidebar-item" data-section="assistant" onclick="switchSection('assistant')">
                    <span class="sidebar-item-icon">✨</span>
                    <span>Personalization</span>
                </div>
                <div class="sidebar-item" data-section="connection" onclick="switchSection('connection')">
                    <span class="sidebar-item-icon">🔌</span>
                    <span>Agent Connection</span>
                </div>
                <div class="sidebar-item" data-section="model" onclick="switchSection('model')">
                    <span class="sidebar-item-icon">🧠</span>
                    <span>Model</span>
                </div>
                <div class="sidebar-item" data-section="tool-permissions" onclick="switchSection('tool-permissions')">
                    <span class="sidebar-item-icon">🔧</span>
                    <span>Agent Tools</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Extensions</div>
                <div class="sidebar-item" data-section="integration" onclick="switchSection('integration')">
                    <span class="sidebar-item-icon" id="integrationSidebarIcon">🔗</span>
                    <span>System Integration</span>
                </div>
                <div class="sidebar-item" data-section="shortcuts" onclick="switchSection('shortcuts')">
                    <span class="sidebar-item-icon">⚡</span>
                    <span>Quick Commands</span>
                </div>
                <div class="sidebar-item" data-section="math" onclick="switchSection('math')">
                    <span class="sidebar-item-icon">🧮</span>
                    <span>Math</span>
                </div>
                <div class="sidebar-item" data-section="colorpicker" onclick="switchSection('colorpicker')">
                    <span class="sidebar-item-icon">🎨</span>
                    <span>Color Picker</span>
                </div>
                <div class="sidebar-item" data-section="devtools" onclick="switchSection('devtools')">
                    <span class="sidebar-item-icon">🛠️</span>
                    <span>Developer Tools</span>
                </div>
                <div class="sidebar-item" data-section="timer" onclick="switchSection('timer')">
                    <span class="sidebar-item-icon">⏱️</span>
                    <span>Timer</span>
                </div>
                <div class="sidebar-item" onclick="openStore()" style="opacity:0.8;">
                    <span class="sidebar-item-icon">🛍️</span>
                    <span>Browse Store...</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">About</div>
                <div class="sidebar-item" data-section="updates" onclick="switchSection('updates')">
                    <span class="sidebar-item-icon">🔄</span>
                    <span>Updates</span>
                </div>
                <div class="sidebar-item" data-section="about" onclick="switchSection('about')">
                    <span class="sidebar-item-icon">ℹ️</span>
                    <span>About Kiro Assistant</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="settings-content">
            <div id="statusMessage" class="status-message"></div>

            <!-- Settings modules will be rendered here -->
            <div id="settingsModules"></div>
        </div>
    </div>

    <!-- Save Button -->
    <div class="save-button-container">
        <button class="save-button" onclick="saveAndClose()">Save &amp; Close</button>
    </div>

    <!-- Theme initialization for settings window -->
    <script>
        function applySettingsTheme(theme) {
            document.body.classList.remove('light-theme');
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else if (theme === 'system') {
                if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.body.classList.add('light-theme');
                }
            }
        }
        // Apply theme on load
        (async function() {
            function waitForTauri(cb) {
                if (window.__TAURI__ && window.__TAURI__.core) cb();
                else setTimeout(() => waitForTauri(cb), 50);
            }
            waitForTauri(async () => {
                try {
                    const config = await window.__TAURI__.core.invoke('get_config');
                    applySettingsTheme(config.ui?.theme || 'system');
                } catch (e) { applySettingsTheme('system'); }
                // Listen for config updates
                window.__TAURI__.event.listen('config_updated', async () => {
                    try {
                        const config = await window.__TAURI__.core.invoke('get_config');
                        applySettingsTheme(config.ui?.theme || 'system');
                    } catch (e) {}
                });
                // Listen for system theme changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', async () => {
                    try {
                        const config = await window.__TAURI__.core.invoke('get_config');
                        if ((config.ui?.theme || 'system') === 'system') applySettingsTheme('system');
                    } catch (e) {}
                });
            });
        })();

        // Ctrl+W to close settings
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'w') {
                e.preventDefault();
                if (window.__TAURI__) {
                    window.__TAURI__.webviewWindow.getCurrentWebviewWindow().hide();
                }
            }
        });

        // Listen for navigation requests from other windows (e.g. floating → updates)
        (function() {
            function waitForTauri(cb) {
                if (window.__TAURI__ && window.__TAURI__.event) cb();
                else setTimeout(() => waitForTauri(cb), 50);
            }
            waitForTauri(() => {
                window.__TAURI__.event.listen('navigate_settings_section', (event) => {
                    const section = event.payload;
                    if (section && typeof switchSection === 'function') {
                        switchSection(section);
                    }
                });
            });
        })();
    </script>

    <script src="vendor/lib/marked.min.js"></script>
    
    <!-- Load all settings modules -->
    <script src="js/settings/base.js"></script>
    <script src="js/settings/hotkey.js"></script>
    <script src="js/settings/connection.js"></script>
    <script src="js/settings/appearance.js"></script>
    <script src="js/settings/system.js"></script>
    <script src="js/settings/assistant.js"></script>
    <script src="js/settings/model.js"></script>
    <script src="js/settings/shortcuts.js"></script>
    <script src="js/settings/tool-permissions.js"></script>
    <script src="js/settings/integration.js"></script>
    <!-- Extension settings modules are loaded dynamically by manager.js -->
    <script src="js/settings/about.js"></script>
    <script src="js/settings/updates.js"></script>
    <script src="js/settings/manager.js"></script>
</body>
</html>
